name: Mettre à jour le catalogue

on:
  push:
    branches:
      - main
    paths:
      - "livres/**"
      - "couvertures/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: catalogue-${{ github.ref }}
  cancel-in-progress: false

jobs:
  catalogue:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer la version la plus récente de main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer catalog.json
        run: python scripts/build_catalog.py

      - name: Détecter une modification du catalogue
        id: catalogue-diff
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- catalog.json)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Committer catalog.json
        if: steps.catalogue-diff.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- catalog.json
          git commit -m "chore: met à jour catalog.json [skip ci]"
          git push origin HEAD:main

      # Un commit poussé avec GITHUB_TOKEN ne déclenche pas automatiquement
      # le build GitHub Pages. Cette requête lance explicitement le build de
      # la source configurée en mode « Deploy from a branch ».
      - name: Demander la reconstruction GitHub Pages
        if: steps.catalogue-diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          curl --fail-with-body --location --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
