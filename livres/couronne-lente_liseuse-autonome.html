<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>La Couronne lente — liseuse</title>
<style>
:root {
  --bg: #11120f;
  --bg-2: #171812;
  --panel: rgba(28, 27, 21, .94);
  --panel-solid: #1c1b15;
  --text: #efe6d0;
  --muted: #b8ad98;
  --dim: #827866;
  --line: rgba(239, 230, 208, .13);
  --line-strong: rgba(239, 230, 208, .22);
  --accent: #d6a45d;
  --accent-soft: rgba(214, 164, 93, .16);
  --accent-line: rgba(214, 164, 93, .45);
  --danger: #c86f5c;
  --shadow: 0 22px 70px rgba(0,0,0,.55);
  --serif: Georgia, "Iowan Old Style", "Palatino Linotype", Palatino, serif;
  --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --read-width: 720px;
  --radius: 22px;
}
* { box-sizing: border-box; }
html { background: var(--bg); color: var(--text); }
body {
  margin: 0;
  min-height: 100svh;
  font-family: var(--serif);
  color: var(--text);
  background:
    radial-gradient(circle at 18% -8%, rgba(214,164,93,.15), transparent 36rem),
    radial-gradient(circle at 84% 6%, rgba(117,108,70,.11), transparent 28rem),
    linear-gradient(180deg, #11120f 0%, #0f100d 55%, #13130f 100%);
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at 50% 16%, black, transparent 78%);
}
button, input { font: inherit; color: inherit; }
button { cursor: pointer; }
a { color: inherit; }
.hidden { display: none !important; }
.app-shell { min-height: 100svh; }
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 30;
  height: calc(56px + env(safe-area-inset-top));
  padding-top: env(safe-area-inset-top);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding-inline: 14px;
  border-bottom: 1px solid rgba(239,230,208,.06);
  background: linear-gradient(180deg, rgba(17,18,15,.92), rgba(17,18,15,.72));
  backdrop-filter: blur(18px);
}
.brandmark {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-family: var(--sans);
  letter-spacing: .08em;
  text-transform: uppercase;
  font-size: 11px;
  color: var(--muted);
}
.brandmark::before {
  content: "";
  width: 19px;
  height: 19px;
  border: 1px solid var(--accent-line);
  border-radius: 50%;
  box-shadow: inset 0 0 0 5px rgba(214,164,93,.055), 0 0 22px rgba(214,164,93,.18);
}
.icon-btn {
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(239,230,208,.035);
  display: grid;
  place-items: center;
  transition: border-color .22s ease, background .22s ease, transform .22s ease;
}
.icon-btn:active { transform: scale(.97); }
.hamburger span, .hamburger span::before, .hamburger span::after {
  display: block;
  width: 16px;
  height: 1px;
  background: var(--text);
  content: "";
  opacity: .86;
}
.hamburger span::before { transform: translateY(-6px); }
.hamburger span::after { transform: translateY(5px); }
.progress {
  position: fixed;
  top: calc(56px + env(safe-area-inset-top));
  left: 0;
  width: 100%;
  height: 2px;
  z-index: 35;
  background: rgba(239,230,208,.055);
}
.progress > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, rgba(214,164,93,.24), var(--accent)); transition: width .12s linear; }
.view {
  min-height: 100svh;
  padding: calc(84px + env(safe-area-inset-top)) 18px 70px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .24s ease, transform .24s ease;
}
.view.active { opacity: 1; transform: translateY(0); }
.home {
  display: grid;
  align-items: center;
  min-height: 100svh;
  padding-top: calc(74px + env(safe-area-inset-top));
}
.home-inner {
  width: min(100%, 920px);
  margin: 0 auto;
  padding: 24px 0 44px;
}
.kicker {
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--accent);
  font-size: 11px;
  margin-bottom: 22px;
}
h1 {
  font-weight: 500;
  margin: 0;
  font-size: clamp(43px, 13vw, 92px);
  line-height: .92;
  letter-spacing: -.052em;
}
.subtitle {
  max-width: 680px;
  margin: 20px 0 0;
  color: var(--muted);
  font-size: clamp(18px, 4.6vw, 25px);
  line-height: 1.45;
}
.home-quote {
  position: relative;
  margin: 38px 0 30px;
  padding: 20px 20px 20px 24px;
  border-left: 1px solid var(--accent-line);
  color: #e3d5b9;
  background: linear-gradient(90deg, rgba(214,164,93,.08), transparent);
  font-size: 18px;
  line-height: 1.6;
}
.home-quote cite {
  display: block;
  margin-top: 12px;
  font-family: var(--sans);
  font-style: normal;
  color: var(--dim);
  font-size: 12px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.action-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 24px 0 34px; }
.primary-btn, .ghost-btn {
  border: 1px solid var(--accent-line);
  border-radius: 999px;
  padding: 13px 18px;
  font-family: var(--sans);
  font-size: 14px;
  letter-spacing: .02em;
  transition: transform .22s ease, border-color .22s ease, background .22s ease;
}
.primary-btn { background: linear-gradient(135deg, rgba(214,164,93,.96), rgba(169,119,56,.96)); color: #17130c; box-shadow: 0 12px 30px rgba(214,164,93,.14); }
.ghost-btn { background: rgba(239,230,208,.035); color: var(--text); border-color: var(--line); }
.primary-btn:active, .ghost-btn:active { transform: scale(.98); }
.home-note {
  margin-top: 30px;
  color: var(--dim);
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: .02em;
}
.home-panels {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 26px;
}
.glass-card {
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(239,230,208,.055), rgba(239,230,208,.025));
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: 0 14px 42px rgba(0,0,0,.16);
}
.card-title {
  margin: 0 0 10px;
  font-family: var(--sans);
  color: var(--text);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .13em;
}
.chapter-list, .codex-list { display: grid; gap: 8px; }
.chapter-link, .codex-row {
  width: 100%;
  text-align: left;
  border: 1px solid transparent;
  background: rgba(0,0,0,.09);
  color: var(--text);
  border-radius: 15px;
  padding: 12px 13px;
  display: grid;
  gap: 3px;
  transition: background .22s ease, border-color .22s ease;
}
.chapter-link:hover, .codex-row:hover { border-color: var(--line); background: rgba(239,230,208,.05); }
.chapter-link.current { border-color: var(--accent-line); background: var(--accent-soft); }
.item-title { font-family: var(--sans); font-size: 14px; }
.item-meta { font-family: var(--sans); font-size: 11px; color: var(--dim); letter-spacing: .04em; text-transform: uppercase; }
.reader-wrap { width: min(100%, var(--read-width)); margin: 0 auto; }
.chapter-head { margin: 18px 0 34px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
.chapter-num {
  font-family: var(--sans);
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .18em;
  font-size: 11px;
  margin-bottom: 12px;
}
.chapter-title {
  margin: 0;
  font-size: clamp(31px, 9vw, 58px);
  line-height: 1.02;
  font-weight: 500;
  letter-spacing: -.035em;
}
.chapter-sub { margin-top: 12px; font-family: var(--sans); color: var(--muted); font-size: 13px; letter-spacing: .04em; }
.ornament {
  width: 94px;
  height: 1px;
  margin-top: 22px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: .72;
}
.prose {
  font-size: clamp(17px, 4.55vw, 19px);
  line-height: 1.72;
  letter-spacing: .003em;
}
.prose p { margin: 0 0 1.28em; }
.prose p:first-child::first-letter {
  float: left;
  font-size: 4.15em;
  line-height: .78;
  padding: .08em .10em 0 0;
  color: var(--accent);
  text-shadow: 0 0 28px rgba(214,164,93,.15);
}
.codex-link {
  border: 0;
  padding: 0 1px 1px;
  background: transparent;
  color: #f3dfb6;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: .19em;
  text-decoration-color: rgba(214,164,93,.38);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
}
.codex-link:active { color: #fff0cf; }
em { color: #e8d8b8; }
.reader-nav {
  margin: 44px auto 0;
  padding-top: 22px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 12px;
}
.nav-btn {
  flex: 1;
  min-height: 48px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(239,230,208,.035);
  font-family: var(--sans);
  font-size: 13px;
}
.nav-btn[disabled] { opacity: .32; cursor: default; }
.codex-page, .about-page { width: min(100%, 980px); margin: 0 auto; }
.section-head { margin: 8px 0 24px; }
.section-head h2 { font-weight: 500; font-size: clamp(32px, 9vw, 56px); line-height: 1.05; letter-spacing: -.04em; margin: 0 0 10px; }
.section-head p { color: var(--muted); margin: 0; max-width: 680px; line-height: 1.6; }
.search-box {
  position: sticky;
  top: calc(66px + env(safe-area-inset-top));
  z-index: 5;
  margin: 18px 0 20px;
  padding: 9px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(17,18,15,.86);
  backdrop-filter: blur(18px);
}
.search-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: rgba(239,230,208,.055);
  border-radius: 13px;
  padding: 13px 14px;
  font-family: var(--sans);
  font-size: 15px;
}
.category-block { margin: 26px 0; }
.category-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 0 0 10px;
  font-family: var(--sans);
  letter-spacing: .14em;
  text-transform: uppercase;
  font-size: 12px;
  color: var(--muted);
}
.category-title .count { color: var(--dim); letter-spacing: .02em; }
.codex-grid { display: grid; gap: 10px; grid-template-columns: 1fr; }
.codex-card {
  position: relative;
  overflow: hidden;
  width: 100%;
  text-align: left;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(239,230,208,.055), rgba(239,230,208,.022));
  padding: 16px;
  transition: transform .22s ease, border-color .22s ease, background .22s ease;
}
.codex-card::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--cat-color, var(--accent)); opacity:.75; }
.codex-card:hover { transform: translateY(-1px); border-color: var(--line-strong); }
.codex-card h3 { margin: 0 0 6px; font-size: 18px; font-weight: 500; }
.codex-card p { margin: 0; color: var(--muted); line-height: 1.45; font-size: 14px; }
.cat-lieux { --cat-color: #d6a45d; }
.cat-factions { --cat-color: #c78162; }
.cat-personnages { --cat-color: #e0c98d; }
.cat-technologie { --cat-color: #9cb0a2; }
.cat-histoire { --cat-color: #b29a73; }
.cat-cultures { --cat-color: #bf9cc2; }
.cat-mysteres { --cat-color: #8c9ac9; }
.menu-overlay, .sheet-overlay {
  position: fixed;
  inset: 0;
  z-index: 70;
  background: rgba(0,0,0,.42);
  opacity: 0;
  pointer-events: none;
  transition: opacity .24s ease;
}
.menu-overlay.open, .sheet-overlay.open { opacity: 1; pointer-events: auto; }
.side-menu {
  position: fixed;
  z-index: 80;
  top: 0;
  right: 0;
  height: 100svh;
  width: min(84vw, 360px);
  padding: calc(18px + env(safe-area-inset-top)) 16px 24px;
  background: rgba(25,25,19,.97);
  border-left: 1px solid var(--line);
  box-shadow: var(--shadow);
  transform: translateX(104%);
  transition: transform .26s ease;
  overflow-y: auto;
}
.side-menu.open { transform: translateX(0); }
.menu-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 16px; }
.menu-title { font-family: var(--sans); text-transform: uppercase; letter-spacing:.16em; font-size: 12px; color: var(--muted); }
.menu-section { margin: 20px 0 8px; color: var(--dim); font-family: var(--sans); font-size: 11px; text-transform: uppercase; letter-spacing: .14em; }
.menu-link {
  width: 100%;
  text-align: left;
  border: 1px solid transparent;
  background: transparent;
  border-radius: 14px;
  padding: 11px 10px;
  font-family: var(--sans);
  font-size: 14px;
}
.menu-link:hover, .menu-link.current { background: rgba(239,230,208,.055); border-color: var(--line); }
.sheet {
  position: fixed;
  z-index: 90;
  left: 0;
  right: 0;
  bottom: 0;
  height: 70svh;
  max-height: 760px;
  background: var(--panel-solid);
  border: 1px solid var(--line-strong);
  border-bottom: 0;
  border-radius: 26px 26px 0 0;
  box-shadow: var(--shadow);
  transform: translateY(106%);
  transition: transform .27s cubic-bezier(.2,.8,.2,1);
  display: grid;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 46px; height: 5px; border-radius: 99px; background: rgba(239,230,208,.24); margin: 10px auto 6px; }
.sheet-top { padding: 0 16px 12px; border-bottom: 1px solid var(--line); }
.sheet-tools { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.back-btn {
  border: 1px solid var(--line);
  background: rgba(239,230,208,.04);
  border-radius: 13px;
  padding: 8px 10px;
  font-family: var(--sans);
  font-size: 12px;
}
.breadcrumb {
  flex: 1;
  min-width: 0;
  font-family: var(--sans);
  color: var(--dim);
  font-size: 11px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.sheet-body { overflow-y: auto; padding: 18px 18px calc(34px + env(safe-area-inset-bottom)); }
.entry { width: min(100%, 760px); margin: 0 auto; }
.entry-cat {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--accent);
  font-size: 11px;
  margin-bottom: 12px;
}
.entry-cat::before { content:""; width: 8px; height: 8px; border-radius: 50%; background: var(--cat-color, var(--accent)); }
.entry h2 { margin: 0 0 10px; font-weight: 500; font-size: clamp(29px, 7vw, 45px); line-height: 1.07; letter-spacing: -.035em; }
.entry-hook { color: var(--muted); font-size: 17px; line-height: 1.5; margin: 0 0 20px; }
.entry-article { border-top: 1px solid var(--line); padding-top: 18px; font-size: 16.5px; line-height: 1.68; }
.entry-article p { margin: 0 0 1.15em; }
.entry-links { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 8px; }
.entry-link-btn {
  border: 1px solid var(--line);
  background: rgba(239,230,208,.04);
  border-radius: 999px;
  padding: 9px 11px;
  font-family: var(--sans);
  font-size: 12px;
}
.about-card { font-size: 17px; line-height: 1.68; color: var(--muted); }
.about-card strong { color: var(--text); font-weight: 500; }
.empty-state { border: 1px solid var(--line); border-radius: 18px; padding: 18px; color: var(--muted); font-family: var(--sans); }
@media (min-width: 720px) {
  .view { padding-inline: 34px; }
  .home-panels { grid-template-columns: 1fr 1fr; }
  .codex-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .sheet { left: 50%; right: auto; width: min(760px, calc(100vw - 44px)); transform: translate(-50%, 106%); border-radius: 28px 28px 0 0; }
  .sheet.open { transform: translate(-50%, 0); }
}
@media (min-width: 1080px) {
  .codex-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; scroll-behavior: auto !important; }
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar" aria-label="Navigation principale">
    <button class="icon-btn hamburger" id="menuBtn" aria-label="Ouvrir le menu"><span></span></button>
    <div class="brandmark" id="brandmark">La Couronne lente</div>
    <button class="icon-btn" id="codexQuickBtn" aria-label="Ouvrir le codex">⌕</button>
  </header>
  <div class="progress" aria-hidden="true"><i id="progressBar"></i></div>

  <main id="app" aria-live="polite"></main>
</div>

<div class="menu-overlay" id="menuOverlay"></div>
<aside class="side-menu" id="sideMenu" aria-label="Menu">
  <div class="menu-head">
    <div class="menu-title">Menu</div>
    <button class="icon-btn" id="menuCloseBtn" aria-label="Fermer le menu">×</button>
  </div>
  <button class="menu-link" data-route="home">Accueil</button>
  <button class="menu-link" data-route="codex">Codex</button>
  <button class="menu-link" data-route="about">À propos</button>
  <div class="menu-section">Chapitres</div>
  <div id="menuChapters"></div>
</aside>

<div class="sheet-overlay" id="sheetOverlay"></div>

  <div>
    <div class="sheet-handle" id="sheetHandle"></div>
    <div class="sheet-top">
      <div class="sheet-tools">
        <button class="back-btn hidden" id="entryBackBtn">Retour</button>
        <div class="breadcrumb" id="breadcrumb"></div>
        <button class="icon-btn" id="sheetCloseBtn" aria-label="Fermer l’entrée">×</button>
      </div>
    </div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</section>

<script>
const CHAPTERS = [
  {
    "number": 1,
    "title": "Les Douze Horloges",
    "pov": "Senn-de-Troisième-Marge",
    "place": "Noyau des Tables",
    "content": "[[senn-de-troisieme-marge|Senn-de-Troisième-Marge]] avait appris à respirer au rythme des horloges contradictoires.\n\nUn proverbe de la Table Basse disait qu’une horloge juste était seulement une horloge qui n’avait pas encore rencontré sa sœur. Senn le trouvait moins drôle depuis que la quittance de sa mère frottait contre sa broche comme une dent contre une autre dent.\n\nDans la salle basse des [[noyau-des-tables|Tables]], il y en avait douze, suspendues au-dessus des bancs d’audit comme des oiseaux sans sommeil. Aucune n’indiquait exactement la même heure. L’écart entre elles ne dépassait jamais quatre-vingt-douze secondes, mais cette mince désobéissance suffisait à rappeler aux [[greffiers-de-parite|Greffiers]] que le temps commun n’était pas un don : c’était un accord surveillé. Les jeunes copistes trouvaient ce dispositif cruel. Senn le trouvait honnête.\n\nIl portait la robe grise des lecteurs de marge, ouverte au col, sans broche de maison. La broche était dans sa poche intérieure, avec la quittance de sa mère, un rectangle de céramique fine où trois lignes gravées suffisaient à clore une dette de famille. Il n’aurait pas dû la garder sur lui pendant un audit de premier rang. Les objets chargés d’histoire rendaient les mesures nerveuses. Mais certains manquements étaient des manières de rester humain sans déranger l’ordre général.\n\nSur la table de verre froid, le dossier d’[[orseille|Orseille]] se déployait en strates lumineuses. Nouvelle [[lentille-de-parite|lentille de parité]], série [[helianthe|Hélianthe]], rendement attendu moins trente-deux pour cent sur les routes denses, opacité technique partielle sous scellés d’atelier, demande de certification accélérée par trois [[maisons-de-pli|Maisons de Pli]], dont Lignes-Basses. Senn fit défiler les certificats préalables avec deux doigts. Les colonnes étaient belles. Trop belles.\n\nUne bonne marge respirait. Elle portait de petites hésitations, des ratures de machines, des notations de fatigue, des corrections de température faites par des gens pressés. Ici, chaque déviation tombait comme une goutte dans un bassin exact. Rien ne débordait, rien ne résistait. Même les erreurs avaient l’air d’avoir reçu une éducation tabulaire.\n\n— Tu fronces la troisième ligne, dit une voix derrière lui.\n\nSenn ne se retourna pas. [[maude-sans-miroir|Maude sans Miroir]], première vérificatrice de sa section, avait une manière d’arriver sans bruit qui passait pour une vertu. Les [[tabulaires|Tabulaires]] aimaient confondre discrétion et autorité.\n\n— La troisième ligne ment rarement, répondit Senn. Elle omet.\n\nMaude posa une coupe de thé clair au bord de la table, assez loin des projections pour montrer qu’elle respectait le travail, assez près pour rappeler qu’elle pouvait l’interrompre.\n\n— Les Ateliers demandent une lecture de conformité, pas une fouille des ancêtres.\n\n— Une lentille qui réduit d’un tiers le coût de passage mérite quelques ancêtres.\n\n— La [[route-basse|route médicale]] de Lignes-Basses a dix-neuf habitats en dépendance forte. Trois retards de certification, et nous devrons choisir quels traitements passent en priorité.\n\nSenn lut cette phrase dans le silence qui la suivit. Maude disait vrai. C’était le pire genre de pression : celui qui venait avec des malades réels et non avec des menaces. Il fit glisser le dossier jusqu’aux couches de fabrication antérieure, celles que les Ateliers consentaient à ouvrir quand un Greffier insistait assez poliment pour devenir dangereux.\n\nLes matériaux témoins indiquaient un protocole de vieillissement en quatre cycles. Chaque cycle devait produire sa propre histoire mesurée : expansion, refroidissement, bruit résiduel, infimes chocs de manutention. Senn appela les sous-registres. Les lignes apparurent, fines comme des fils de rasoir. Au milieu du deuxième cycle, il trouva un blanc.\n\nPas une lacune. Pas une corruption. Un [[blancs-reguliers|blanc régulier]].\n\nIl agrandit l’image. Les bords de l’absence étaient trop nets, arrondis exactement selon l’ancien format des clôtures pré-Parité, que personne n’utilisait plus sauf dans les reconstitutions pédagogiques. Senn sentit sa nuque se refroidir. Avant la [[premiere-parite|Première Parité]], il n’y avait pas de protocoles de lentille. Il ne pouvait donc pas y avoir de format de clôture applicable à un matériau de lentille. Une absurdité ne le dérangeait pas. Les absurdités étaient des faits mal rangés. Ce qui le dérangeait, c’était la courtoisie de celle-ci.\n\n— Montre, dit Maude.\n\nIl hésita un battement. Le règlement interdisait de retenir une anomalie en présence d’un supérieur. Le règlement interdisait aussi de présenter une inférence non stabilisée comme anomalie. Les lois tabulaires avaient survécu des siècles grâce à cette élégante manière de permettre toutes les lâchetés.\n\nIl fit pivoter la couche. Maude regarda longtemps. Son visage ne changea pas ; seuls ses doigts se refermèrent un peu trop fort sur la coupe.\n\n— Erreur de notation ancienne, dit-elle enfin.\n\n— Ancienne de quoi ?\n\n— De transfert de format. Les Ateliers réutilisent des structures mortes pour économiser la lecture. Tu le sais.\n\n— Une structure morte ne précompense pas un bruit de fabrication qui n’a pas encore eu lieu.\n\nMaude effaça l’agrandissement d’un geste. Elle ne détruisit rien ; elle ramena seulement le dossier à sa vue certifiable. Ce genre de geste était plus violent qu’un cri.\n\n— Tu traites cela comme une erreur de notation. Tu demandes une attestation complémentaire à Orseille. Tu ne bloques pas la certification provisoire.\n\n— Je ne peux pas signer une marge que je ne comprends pas.\n\n— Tu n’as pas à la comprendre. Tu as à dire si elle tue plus que l’absence de lentille.\n\nCette fois, Senn se tourna. Maude avait les yeux secs des gens qui ont déjà sacrifié une partie d’eux-mêmes et qui détestent voir les autres arriver devant le même autel avec des mains propres.\n\n— Nous certifions la compatibilité, dit-il. Pas l’utilité.\n\n— Phrase d’école. Très belle. Très dangereuse quand on a fini l’école.\n\nElle partit sans reprendre la coupe. Senn resta sous les douze horloges, avec le dossier revenu à sa perfection. Il aurait dû enregistrer son désaccord, ouvrir une marge contradictoire, prévenir le comité. Chaque action créerait une trace. Chaque trace serait visible avant qu’il ait compris ce qu’il regardait. Et si Maude avait raison, son scrupule pouvait retarder des traitements dans dix-neuf habitats.\n\nIl appela la couche supprimée depuis la mémoire de travail. Les Tables permettaient cette consultation pendant cent vingt secondes avant purge. Il copia le blanc régulier sur une plaquette non certifiée, sans sceau, sans valeur juridique. Un objet sale. Un objet privé.\n\nAu moment où il allait refermer, une métadonnée apparut dans la bordure : non pas le nom d’un Atelier, mais celui d’une route d’assurance. Lignes-Basses / concession de détour / [[ancre-residuel|Ancre résiduel]].\n\nSenn retira la plaquette et la glissa contre la quittance de sa mère. Les deux céramiques se touchèrent dans sa poche avec un bruit minuscule. Il lui sembla entendre une erreur reconnaître une autre erreur.\n\nUne des horloges au-dessus de lui perdit quatre secondes d’un coup."
  },
  {
    "number": 2,
    "title": "Celle-qui-garde-la-buée",
    "pov": "Lio de Sève-Retard",
    "place": "Serres de Ronce-Claire",
    "content": "À [[serres-de-ronce-claire|Ronce-Claire]], personne ne disait qu’une plante poussait. Les enfants chantaient plutôt, en comptant les verrières : *si tu m’arraches, demande au sol ce qu’il perd*. [[lio-de-seve-retard|Lio]] avait toujours trouvé la chanson trop simple, donc probablement ancienne. On demandait plutôt de quel côté elle reprenait.\n\nLio de Sève-Retard traversa la serre neuvième en gardant la main ouverte sous les feuilles basses. La peau de sa paume reconnaissait les humeurs avant ses yeux : chaleur sèche d’une tige qui mentait sur sa soif, picotement d’une racine prête à changer de sel, vibration douce d’une floraison qui cherchait son heure. Au-dessus des verrières, l’étoile variable envoyait une lumière coupée de bandes noires. Les horloges roncelières n’avaient jamais tenté de la corriger. Elles se contentaient de noter ses caprices avec des noms de saison.\n\nLe rameau interdit vivait dans une fosse de terre suspendue, entouré de trois cercles de verre mycorhizé et de sept osselets minéraux. Les osselets venaient des morts de la famille, non de leurs corps — les [[ronceliers|Ronceliers]] n’aimaient pas conserver la chair — mais des outils qu’ils avaient tenus jusqu’à l’usure. La grand-mère de Lio était là, sous forme de cuivre vert. Son frère mort enfant, sous forme de silice fendue. Une tante sans patience, en fer noirci.\n\nLa plante n’avait pas de nom fixe. La nommer trop tôt revenait à lui demander de rester. Ce matin-là, Lio l’appelait Celle-qui-garde-la-buée, parce que les gouttes sur ses nervures tombaient vers le haut avant de disparaître.\n\n— Tu lui parles encore comme à une invitée, dit Arance au Fruit-Fendu depuis l’allée.\n\nLio ne se retourna pas. Arance avait été choisie par les serres pour négocier avec les étrangers parce qu’elle savait sourire sans ouvrir la maison. Elle portait un manteau de fibres vivantes qui changeaient de couleur selon l’acidité de l’air. Depuis trois jours, le manteau restait gris.\n\n— Une invitée peut partir, répondit Lio. Une propriété attire les voleurs.\n\n— Justement. Ils sont arrivés.\n\nIls, depuis une saison, désignait toujours la même espèce de visiteurs : courtois, vaccinés contre toutes les pollens connus, accompagnés de cadeaux trop standards pour être innocents. Lio quitta la fosse après avoir effleuré le verre intérieur. Une petite douleur passa sous son ongle, comme si la plante avait retenu une écharde de temps.\n\nDans la serre d’accueil, trois personnes attendaient sous les cloches anti-spores. Leur cheffe portait la coupe tabulaire des auditeurs commerciaux, mais ses bottes étaient de route marchande. Pas une Greffière. Pas une Roncelière. Une bouche de Maison.\n\n— Nous venons pour les lignées de stabilisation saisonnière, dit-elle après les salutations. Les habitats de la [[route-basse|route basse]] connaissent une dérive immunitaire. Vos cultures peuvent sauver des enfants.\n\nCela aussi était le pire genre de pression. Ronce-Claire nourrissait la Couronne en méfiance, mais la maladie passait toujours entre les doctrines. Arance répondit avec la lenteur du [[droit-de-broussaille|droit de broussaille]] :\n\n— Les lignées ouvertes sont dans le catalogue certifié. Les lignées en reprise ne sont pas des marchandises. Les lignées sans nom n’existent pas pour vos contrats.\n\nLa visiteuse inclina la tête.\n\n— Alors nous ne demanderons rien qui existe.\n\nLio regarda ses mains. Sous l’ongle piqué, une tache claire dessinait un cercle parfait. Il sentit un souvenir qui n’était pas le sien : une salle froide, douze horloges, un blanc aux bords arrondis. Il ferma le poing. La plante n’avait jamais fait cela. Elle absorbait des [[ecart|écarts]] minuscules — une pince retrouvée avant sa chute, deux témoins en désaccord sur la couleur d’un fruit, la voix d’un mort dans un rêve bref. Elle ne donnait pas d’images d’un autre monde.\n\n— Vous avez apporté quelque chose, dit-il.\n\nLa cheffe commerciale sourit moins.\n\n— Des filtres respiratoires, des sels, trois lots de pièces pour vos voiles thermiques.\n\n— Non. Quelque chose qui ne veut pas être ici.\n\nArance tourna vers lui un regard d’avertissement. Trop tard. Les visiteurs avaient compris qu’il existait une porte derrière la porte.\n\nLa négociation dura encore vingt minutes, avec la politesse précise de gens qui se testaient pour savoir où commencer la violence. Puis les étrangers partirent en laissant leurs cadeaux scellés. Arance attendit que les cloches soient purgées.\n\n— Tu as parlé hors racine.\n\n— La plante a reçu une mémoire.\n\n— Les plantes reçoivent tout. C’est pourquoi nous ne donnons pas tout aux [[noyau-des-tables|Tables]].\n\n— Une salle du Noyau. Une anomalie de [[lentille-de-parite|lentille]]. Je l’ai vue.\n\nArance pâlit, non par peur du Noyau, mais parce qu’une plante sans nom venait peut-être d’établir une relation à travers une distance que personne n’avait préparée. Une [[concordance|Concordance]] sauvage était un conte pour effrayer les enfants trop nets. Ou un crime.\n\nDans la fosse, Celle-qui-garde-la-buée frémissait. Les gouttes remontaient plus vite. Lio posa ses deux mains sur le verre. Cette fois, le souvenir fut plus dur : un bruit de céramique contre céramique, un nom de route, une planète interdite. Puis un appel sans voix, non pas adressé à lui, mais passant par lui parce qu’il avait eu la paume ouverte.\n\nLes alarmes de serre se mirent à sonner. Pas celles du feu ni des spores. Les alarmes de scellés.\n\nArance courut vers la galerie des sas. Lio resta une seconde devant la plante. Protéger voulait dire ne pas déplacer. Protéger voulait dire empêcher le monde d’entrer. Mais le monde était déjà là, sous forme de mémoire étrangère, et les contrats reviendraient avec des mains.\n\nIl prit le couteau de greffe de sa tante de fer noirci. La lame, polie par trois générations de coupes, ne trembla pas. Il choisit un rameau secondaire, assez jeune pour reprendre, assez vieux pour porter la faute. Quand il coupa, la plante ne saigna pas. Elle souffla une buée froide où apparurent des lettres qu’il ne sut pas lire.\n\nIl enveloppa le rameau dans une gaine de mousse et glissa trois osselets minéraux dans sa poche : cuivre vert, silice fendue, fer noirci. Les morts n’aimaient pas voyager, mais ils détestaient encore plus être volés.\n\nLa verrière d’entrée céda avec un craquement propre. Des silhouettes en combinaisons de passage avancèrent entre les fruits suspendus. Elles portaient des scellés réguliers. Pires que des pirates : des gens autorisés par une version du droit.\n\nLio prit la galerie des racines, celle que les plans certifiés nommaient improprement conduite d’irrigation. Derrière lui, Arance criait son nom ou peut-être une injure de saison. Il ne se retourna pas. Dans sa paume, le rameau battait à contre-rythme de son cœur.\n\nDehors, l’étoile variable entra dans une phase sombre. Les ombres des serres se mélangèrent. Pendant quelques secondes, Ronce-Claire eut assez de broussaille pour mentir à ses poursuivants.\n\nLio courut."
  },

    "number": 3,
    "title": "La Caisse froide",
    "pov": "Tarek Main-Sèche",
    "place": "Digue de Huit",
    "content": "Dans les couloirs de [[digue-de-huit|Huit-Bord]], on chantait rarement juste. La chanson des vieilles pièces commençait toujours par la même ligne : *si tu lis ceci, j’ai été remplacé correctement*. [[tarek-main-seche|Tarek]] n’aimait pas les chansons, sauf quand elles servaient de manuel.\n\nTarek Main-Sèche faisait confiance à trois choses : une pression qui baissait lentement, une clé qui avait déjà servi, et un équipage qui jurait trop en travaillant. Ce matin de Digue, les trois étaient présents. Il aurait dû se sentir presque riche.\n\nLe relais Huit-Bord n’était pas beau. Les poètes du [[noyau-des-tables|Noyau]] décrivaient parfois la Digue comme un chapelet noble lancé dans le vide, vestige des [[traversees-muettes|Traversées muettes]], monument à la patience humaine. Tarek aurait aimé les inviter à démonter un joint d’eau grise avec les mains engourdies pendant qu’un ventilateur toussait des cristaux de givre dans leur nuque. La Digue tenait parce que des gens remplaçaient des pièces avant qu’elles aient le droit de mourir. La noblesse venait après, dans les chansons de ceux qui n’avaient pas respiré l’air recyclé.\n\nIl examinait le [[registre-causal|registre]] de cargaison dans la baie lente. Trois conteneurs de céramique lourde, scellés par une [[maisons-de-pli|Maison de Pli]], destination provisoire : [[orseille|Orseille]], via détour technique. Masse déclarée : vingt-sept tonnes et huit dixièmes. Masse au crochet principal : vingt-huit tonnes et deux dixièmes. Masse au palpeur inertiel : vingt-sept tonnes et huit dixièmes. Masse selon la vieille balance mécanique qu’il gardait contre les moqueries : vingt-huit tonnes et deux dixièmes.\n\n— Le crochet et la grand-mère sont d’accord, dit Ilsa des Pompes. Je vote pour croire les vieux.\n\n— Le contrat paie les pièces si on croit le registre, répondit Tarek.\n\nIlsa cracha dans le récupérateur, geste interdit par trois normes sanitaires et respecté par toute personne raisonnable à bord.\n\n— Les pièces pour la pression nord ?\n\nTarek ne répondit pas. La pression nord tenait par des rustines de promesse. Si les compresseurs lâchaient, deux cents personnes devraient migrer vers le segment chaud, déjà trop peuplé. Les contrats de Maison avaient le talent de sentir exactement quand une station devenait négociable.\n\nLe représentant de Lignes-Basses attendait près du sas, combinaison lisse, mains visibles, sourire calibré pour ne pas offenser les [[diguards|Diguards]] avec trop d’aisance.\n\n— La différence vient d’un blindage thermique non compté, expliqua-t-il. Les [[ateliers-d-orseille|Ateliers d’Orseille]] imposent parfois des protections supplémentaires.\n\n— Alors ils les notent.\n\n— Pas toujours dans les copies de transit.\n\n— Sur la Digue, ce qui pèse est noté.\n\nLe représentant baissa la voix.\n\n— Sur la Digue, ce qui respire demain dépend aussi de ce qui passe aujourd’hui.\n\nTarek sentit Ilsa se raidir. Il leva deux doigts : pas maintenant. La colère était une fuite de pression comme une autre. Il fallait savoir où la laisser sortir.\n\nIl signa l’acceptation conditionnelle. Le registre lui brûla presque la paume. Les Maisons avaient modernisé leurs contrats pour qu’ils produisent une petite vibration quand la responsabilité changeait de corps. Une superstition juridique, disaient-elles. Tarek appelait cela un mensonge qui avait appris à toucher.\n\nLe remorquage commença six heures plus tard. Les conteneurs quittèrent la baie dans un silence de pierre. Le vaisseau de traction de Tarek, le Maintien-17, n’avait ni élégance ni vitesse. Il tirait. C’était sa fonction et, certains jours, sa philosophie.\n\nÀ mi-distance du premier relais, la caisse centrale changea de température sans raison. Puis les instruments de masse se disputèrent de nouveau, mais cette fois en rythme. Vingt-sept huit. Vingt-huit deux. Vingt-sept huit. Vingt-huit deux. Comme un cœur mal décidé.\n\n— Blindage thermique, mon cul, dit Ilsa.\n\nTarek enfila sa combinaison de visite. Il n’aimait pas ouvrir une cargaison sous contrat. Il aimait encore moins remorquer un problème qu’il n’avait pas regardé en face. Dans la soute externe, les parois vibraient au chant bas des câbles. Il posa la vieille clé de son père contre le scellé de Maison. Le scellé reconnut une autorité de maintenance supérieure au secret commercial. Les Maisons oubliaient parfois que la Digue avait été construite avant leurs clauses.\n\nLa caisse s’ouvrit sur du froid blanc.\n\nÀ l’intérieur, un cylindre médical flottait dans des sangles. Pas une arme, pas une lentille. Un corps.\n\nLa personne semblait jeune, ou très vieille d’une manière que la peau ne montrait pas. Des électrodes minérales couvraient ses tempes. Deux étiquettes étaient fixées au cylindre. La première indiquait : témoin matériel, non-personne, statut de conservation. La seconde, plus ancienne, indiquait : passager sous [[declaration-d-ame|déclaration d’âme]], ne pas simplifier sans deuil.\n\nTarek lut trois fois. La colère ne vint pas. Seulement un calme dangereux, celui qui précédait les gestes dont on ne pouvait plus se dédire.\n\n— Capitaine ? appela Ilsa dans la liaison.\n\n— On a un corps.\n\nUn silence. Puis :\n\n— Vivant ?\n\nTarek regarda le moniteur. Le pouls existait sur une ligne et pas sur l’autre. La température centrale était incompatible avec la respiration. Les deux masses de la caisse prirent soudain un sens obscène.\n\n— Ça dépend de l’instrument.\n\nLe contrat se projeta automatiquement dans son casque, réveillé par l’ouverture non prévue. En cas d’instabilité causale menaçant un relais ou une route, le transporteur s’engageait à larguer la charge dans un bassin désigné. Destination de largage : [[verrance|Verrance]] secondaire / [[couche-non-admise|couche non admise]] / accès par détour [[ancre-residuel|Ancre résiduel]].\n\nTarek cessa de respirer une seconde. Il connaissait toutes les cartes publiques de la Digue. Cette destination n’y figurait pas. Une couche non admise n’était pas un lieu. C’était une manière propre de dire que quelqu’un avait besoin d’un endroit dont personne ne porterait le nom.\n\nL’alarme de pression s’alluma dans le Maintien-17. La caisse centrale tirait sur les systèmes. Le relais Huit-Bord demanda la situation. Les pièces promises attendaient dans la clause. Deux cents personnes respiraient sur une rustine. Un corps dans un cylindre était peut-être une personne, peut-être un objet, peut-être une dette que d’autres avaient appris à emballer.\n\nTarek referma la caisse sans réactiver le scellé de Maison. À la place, il posa un verrou de Digue, simple, laid, impossible à ouvrir sans outil physique.\n\n— On continue, dit-il à Ilsa.\n\n— Le relais ?\n\n— On garde pression.\n\nElle comprit ce qu’il venait de risquer. Il l’entendit au silence plus qu’aux mots.\n\n— Alors je vais jurer beaucoup, dit-elle enfin.\n\n— Fais utile.\n\nDans le froid de la soute, Tarek posa une main gantée sur le cylindre. Il ne promit rien au corps. Les Diguards ne promettaient pas aux gens endormis, aux morts possibles, ni aux contrats malades. Mais il resta là jusqu’à ce que les instruments cessent de battre en alternance.\n\nQuand il revint au poste, une nouvelle destination s’était inscrite sur l’écran de route, sans commande de sa part : Orseille démonstration / priorité de parité.\n\nLe Maintien-17 tira sa cargaison vers une ville de lentilles, avec une station en manque de pièces derrière lui et, devant, une carte qui commençait à mentir."
  },
  {
    "number": 4,
    "title": "La Troisième Chaise",
    "pov": "Ova sous Clôture",
    "place": "Verrance / Noyau des Tables",
    "content": "À [[verrance|Verrance]], les rues ne se croisaient pas toujours dans le même ordre. On enseignait aux enfants un proverbe moins tendre qu’une berceuse : la chaise vide sait qui parle avant la bouche. [[ova-sous-cloture|Ova]] l’avait appris avant de savoir mentir proprement.\n\nOva sous Clôture le savait depuis l’enfance et marchait en conséquence : jamais deux pas rapides après une enseigne verte, jamais regarder son reflet dans les vitrines de la Traverse-Cendre, toujours saluer le puits d’air même quand il n’était pas encore construit. Les étrangers appelaient cela superstition. Les habitants de Verrance appelaient cela politesse envers les conséquences.\n\nCe matin-là, le quartier des Dates-Basses avait trois saisons. Au niveau inférieur, la condensation gelait sur les rampes ; deux étages plus haut, les enfants couraient dans une pluie tiède ; entre les deux, une poussière jaune tombait d’un plafond qui se souvenait d’un jardin administratif supprimé depuis cinquante ans. Ova traversa ces climats avec sa sacoche de plaideuse contre la hanche. Dans la sacoche, mille trois cent vingt-sept actes de naissance, huit cents actes de décès, quarante-neuf décisions d’invalidité, et une pierre noire qui n’était pas encore une preuve.\n\nElle se rendait chez [[iram-sans-suture|Iram sans Suture]], témoin clé du procès. Iram vivait dans une pièce étroite où les murs changeaient de couleur selon la version de sa fatigue. Trois chaises y étaient disposées. Une pour lui, une pour son visiteur, une pour la personne qu’il aurait dû être si le [[debordement-d-ancre|Débordement d’Ancre]] avait choisi une seule suite.\n\n— Tu es en avance, dit-il.\n\n— Par rapport à laquelle de tes horloges ?\n\nIl sourit. Ses lèvres étaient gercées du côté gauche seulement. Il avait soixante ans dans les mains, trente dans la gorge, et des yeux d’enfant quand il oubliait de se défendre.\n\n— La méchante.\n\nOva sortit les feuilles de déposition. Elle n’utilisait le papier qu’avec les témoins de Verrance. Les tablettes corrigeaient trop vite. Le papier avait la décence de garder une rature visible.\n\n— Nous devons répéter la séquence. Tu étais présent lors de la fermeture du bassin auxiliaire d’Ancre, tu as vu les corps transférés, tu as entendu l’ordre de clôture.\n\n— Oui.\n\n— Tu as onze ans dans cette version.\n\n— Oui.\n\n— Tu ne mentionnes pas l’autre âge devant les juges sauf s’ils demandent.\n\n— Ils demanderont.\n\n— Alors tu répondras : mon état contient plusieurs âges recevables, mais mon témoignage porte sur une continuité admise.\n\nIram regarda la troisième chaise.\n\n— Ce n’est pas vrai.\n\nOva posa la plume. Elle avait bâti sa vie sur la capacité de donner aux [[noyau-des-tables|Tables]] juste assez de contradiction pour qu’elles ne puissent pas détourner les yeux, pas assez pour qu’elles ferment le dossier par hygiène. Un procès était une [[chambre-de-passage|chambre de passage]] : il fallait rendre des douleurs compatibles avec la machine qui les recevait.\n\n— C’est recevable, dit-elle.\n\n— Ce n’est pas vrai.\n\nSa voix changea au dernier mot. Plus basse, plus lente. Ova sentit la pièce perdre une saison. Le mur derrière Iram devint gris tabulaire, froid comme une archive.\n\n— Ne simplifie pas sans deuil, dit la voix.\n\nOva ne bougea pas. Cette phrase figurait dans les anciennes [[declaration-d-ame|déclarations d’âme]], pas dans les procédures de [[descendants-du-debordement|Descendants]]. Peu de gens à Verrance la connaissaient. Iram n’avait aucune raison de la dire ainsi, avec l’accent des Traversées muettes.\n\n— Qui parle ? demanda-t-elle.\n\n— Une dette tenue hors compte.\n\nPuis Iram toussa, redevint Iram, et se mit à pleurer sans bruit. La troisième chaise craqua comme si quelqu’un venait de s’y lever.\n\nOva rangea les papiers lentement. Une part d’elle voulait consoler. Une autre, plus laide et plus professionnelle, comprenait qu’elle venait peut-être d’obtenir la preuve impossible dont son procès avait besoin. Elle détesta cette part. Elle la laissa travailler.\n\n— Iram, as-tu reçu des messages depuis la [[digue-de-huit|Digue]] ?\n\n— Je n’ai jamais quitté Verrance.\n\n— Ce n’est pas ce que j’ai demandé.\n\nIl secoua la tête. Sur la table, la pierre noire de la sacoche vibra une fois. Ova l’avait prise dans les ruines administratives du quartier des Mères-Annulées, où des noms apparaissaient parfois sur les murs avant leur naissance. La pierre portait trois dates de mort de sa grand-mère. Elle n’avait jamais vibré.\n\nLe départ pour le Noyau était prévu par message compressé, pas par passage humain. Ova n’avait ni l’argent ni l’envie d’une déclaration d’âme. Sa présence serait transportée par preuves, voix, image, signatures de témoins. Les [[greffiers-de-parite|Greffiers]] préféraient les plaideurs ainsi : suffisamment présents pour être contredits, pas assez pour salir les chambres avec leurs biographies.\n\nElle envoya le dossier trois heures plus tard depuis l’antenne haute. La compression coupa les chants de fond, les respirations inutiles, les hésitations. Ova regarda les versions d’elle-même devenir un faisceau recevable. À mi-transfert, l’écran signala une correction automatique sur douze actes de naissance.\n\nElle interrompit trop tard.\n\nLes noms étaient les mêmes. Les dates, non. Des enfants nés à Verrance se retrouvaient inscrits comme nés dans un bassin auxiliaire non admis. Un lieu sans existence juridique venait d’entrer dans son dossier par effraction. Ou d’y revenir.\n\nAu Noyau des Tables, sa représentation s’ouvrit dans une salle d’audience secondaire. Les juges apparurent comme trois silhouettes sobres, chacune entourée de marges actives. Le représentant des Greffiers salua. Les observateurs économiques avaient envoyé des avatars sans visage. Ova reconnut le sceau de Lignes-Basses parmi eux.\n\n— Plaideuse Ova sous Clôture, dit la juge centrale. Votre dossier présente des corrections non stabilisées. Souhaitez-vous ajourner ?\n\nC’était une porte élégante vers la défaite. Ajourner, c’était donner aux Tables le temps de nettoyer la contradiction, aux [[maisons-de-pli|Maisons]] le temps d’acheter les témoins, à Verrance le temps de déborder davantage.\n\nOva posa la pierre noire devant le capteur. Elle avait prévu de la garder pour plus tard, quand les juges seraient assez engagés pour ne plus pouvoir se retirer. Les coïncidences, se dit-elle, ne sauvent jamais. Elles obligent seulement à entrer plus tôt dans la pièce.\n\n— Non. Je dépose avec les corrections. Et je demande qu’elles soient versées au dossier comme faits litigieux, non comme erreurs.\n\nUn murmure parcourut les marges actives.\n\n— Vous rendez votre propre requête moins recevable, dit la juge.\n\n— Je rends mon peuple moins facile à refuser.\n\nLa pierre vibra de nouveau. Cette fois, les capteurs du Noyau l’entendirent. Les marges de la salle se hérissèrent de chiffres rouges. Quelque part dans la procédure, un objet sans chaîne complète venait de demander à être traité comme témoin.\n\nLa juge centrale fixa Ova avec une attention neuve, presque hostile.\n\n— Produisez l’objet matériel dans une chambre certifiée, dit-elle. Sans cela, votre contradiction restera rhétorique.\n\nOva pensa à Iram, à la troisième chaise, aux enfants dont les naissances venaient d’être déplacées dans un lieu interdit. Elle pensa à Verrance entière, bassin que la Couronne utilisait comme on utilise une cave pour ne pas voir la moisissure du banquet.\n\n— Alors certifiez une chambre qui supporte ce que vous avez envoyé chez nous, répondit-elle.\n\nLa séance fut suspendue. Pas close. Suspendue. C’était une victoire minuscule et dangereuse.\n\nÀ Verrance, en sortant de l’antenne, Ova vit que la rue principale menait désormais au puits d’air avant l’avoir dépassé. Cela n’arrivait que les jours où le quartier essayait de se souvenir d’une fuite.\n\nElle serra la pierre dans sa sacoche. Pour la première fois depuis des années, elle ne savait plus si elle portait une preuve, une personne ou un piège."
  },
  {
    "number": 5,
    "title": "Le Contrat Hélianthe",
    "pov": "Maël des Lignes-Basses",
    "place": "Orseille",
    "content": "[[mael-des-lignes-basses|Maël des Lignes-Basses]] n’aimait pas les salles hautes d’[[orseille|Orseille]]. On y voyait trop loin.\n\nLes anciens mineurs appelaient la géante Larmes-Jaunes, nom vulgaire qu’Orseille avait corrigé dans tous les guides. Maël préférait ce nom : il disait au moins que la beauté avait un prix de pression.\n\nLa cité flottait dans les couches dorées de la géante, suspendue à des ballons de diamant souple et à des champs de portance que les [[ateliers-d-orseille|Ateliers]] entretenaient avec une jalousie de musiciens. Les fenêtres n’étaient jamais parfaitement transparentes. Elles filtraient les tempêtes pour leur donner une beauté recevable : rubans d’ammoniac, éclairs lents, ombres de plateformes minières plus bas dans la brume. Orseille vendait de la maîtrise jusque dans ses paysages.\n\nMaël préférait les pièces basses, sans vue, où les contrats perdaient leur romantisme. Mais les Ateliers recevaient les [[maisons-de-pli|Maisons]] selon leur propre théâtre. Il attendait donc sous une voûte de verre accordé, avec trois conseillers derrière lui et dix-neuf habitats médicaux dans sa poche intérieure, sous forme de projections de besoin.\n\n[[dame-sio-d-atelier-clair|Dame Sio d’Atelier-Clair]] arriva sans escorte. Les maîtres lentilliers ne se déplaçaient jamais en groupe pour une négociation : cela aurait donné l’impression que leur savoir pouvait se diviser. Elle était vieille, ou se composait une vieillesse utile. Ses doigts portaient des anneaux de mesure qui chantaient très doucement quand elle salua.\n\n— Lignes-Basses veut l’exclusivité de la série [[helianthe|Hélianthe]], dit-elle. Les Maisons plus anciennes réclament la même chose avec davantage d’arrogance.\n\n— Elles ont davantage d’argent. Nous avons davantage de routes malades.\n\n— Argument moral ou menace commerciale ?\n\n— Prévision.\n\nElle sourit. Les gens d’Orseille respectaient les réponses qui ne cherchaient pas à plaire.\n\nIls s’assirent devant une table nue. Aucun contrat visible. Les Ateliers trouvaient vulgaire de montrer les chaînes avant d’avoir parlé des principes. Maël lança tout de même ses chiffres dans l’air entre eux. Dix-neuf habitats. Trois classes de médicaments instables. Deux famines évitées l’année précédente grâce à des passages coûteux. Une dette d’[[ecart|Écart]] en croissance que les bassins reconnus ne pouvaient plus absorber sans augmentation de péage.\n\n— Hélianthe réduit la charge, dit-il. Si nous obtenons deux ans d’exclusivité sur la [[route-basse|route basse]], nous maintenons les prix de traitement.\n\n— Vous maintenez aussi votre Maison.\n\n— Je ne sépare pas les deux quand les tuyaux passent par nous.\n\n— Voilà la franchise que les [[greffiers-de-parite|Greffiers]] appellent cynisme.\n\n— Les Greffiers ont des salaires qui arrivent même quand un relais manque de pièces.\n\nDame Sio posa les mains sur la table. Une lentille miniature apparut, pas plus grande qu’une graine plate. Elle semblait faite d’eau dure et de nuit. Ses bords ne reflétaient pas la salle au même moment que son centre.\n\n— Hélianthe n’est pas seulement moins chère. Elle sait préaccorder les divergences probables. Les anciennes lentilles corrigeaient après mesure. Celle-ci prépare la marge.\n\nMaël sentit le mot dangereux avant que ses conseillers ne réagissent. Préparer la marge voulait dire deviner où l’Écart naîtrait et lui fabriquer une place. Utile. Élégant. Peut-être interdit.\n\n— Où va la différence ? demanda-t-il.\n\n— Là où elle serait allée de toute façon.\n\n— Réponse d’artisan à un enfant.\n\nLes anneaux de Dame Sio chantèrent plus bas.\n\n— Dans des bassins désignés, des couches de compensation, des matériaux témoins, des contrats de route. Votre Maison en utilise déjà.\n\n— Pas pour précompenser une erreur qui n’existe pas encore.\n\n— Vous assurez des récoltes avant les maladies.\n\n— Une maladie ne devient pas vraie parce que je l’assure.\n\n— Vous en êtes certain ?\n\nIl détesta la question parce qu’elle était intelligente. Les Maisons de Pli vendaient des protections contre des risques qu’elles contribuaient parfois à rendre pensables, puis probables, puis tarifés. Maël n’avait jamais cru son métier pur. Il le croyait nécessaire. Cette distinction lui avait suffi jusqu’à présent.\n\nDame Sio fit apparaître une clause ancienne. Le sceau de Lignes-Basses y figurait, plus jeune de trois siècles, à côté d’une mention d’[[ancre-residuel|Ancre résiduel]]. Maël ne l’avait vue qu’une fois, dans une archive de famille fermée après la mort de son père. Concession de détour. Usage de [[couche-non-admise|couche non admise]]. Compensation silencieuse en échange de priorité médicale.\n\n— Pourquoi avez-vous cela ?\n\n— Parce que votre Maison a apporté les premiers matériaux témoins qui ont permis à Hélianthe de comprendre certains retours d’Écart.\n\n— Volés à Ancre ?\n\n— Hérités d’un désastre que personne n’a su clore.\n\nLa nuance avait coûté cher à quelqu’un. Maël regarda les projections des dix-neuf habitats. Des noms de patients défilaient dans les sous-couches : enfants immunodéprimés, vieillards sous greffe, ouvriers contaminés par des solvants de station. Il aurait voulu que le monde lui offre une mauvaise action simple à refuser. Au lieu de cela, il lui proposait un mécanisme déjà engagé, des vies déjà liées à la faute, et la possibilité de choisir entre aggraver proprement ou laisser mourir par scrupule.\n\n— L’audit des Tables ? demanda-t-il.\n\n— En cours. Un Greffier trop fin a demandé des couches complémentaires.\n\n— Nom ?\n\n— [[senn-de-troisieme-marge|Senn-de-Troisième-Marge]].\n\nMaël enregistra. Les petits noms tabulaires étaient souvent plus dangereux que les grandes maisons ; ils avaient moins à protéger, donc parfois plus de place pour l’exactitude.\n\n— Si je signe, les routes basses restent ouvertes ?\n\n— Oui.\n\n— Si je ne signe pas ?\n\n— Les routes restent chères, les Maisons anciennes achètent la série, vos habitats négocient au cas par cas, et vous perdez le levier qui vous permet encore d’imposer des prix humains.\n\nIl aurait pu demander du temps. Le temps était une richesse de ceux dont les malades n’attendaient pas dans les colonnes de projection. Il signa.\n\nLe contrat apparut seulement après son geste, comme si Orseille voulait lui laisser l’illusion qu’il avait accepté un principe avant d’accepter des lignes. Une vibration passa dans sa paume. Plus légère que celle des contrats de transport, plus intime. Les Ateliers savaient rendre une faute presque musicale.\n\n— Vous recevrez l’exclusivité conditionnelle après la démonstration publique, dit Dame Sio.\n\n— Le Greffier peut bloquer.\n\n— Il peut refuser de signer. Ce n’est pas toujours la même chose.\n\nMaël se leva. Par la fenêtre filtrée, un éclair immense ouvrit la géante gazeuse sur une profondeur verte. Pendant une seconde, il crut voir sous les nuages une ville renversée qui n’avait rien à faire là. Puis le verre corrigea l’image.\n\nSon assistant lui tendit un message entrant. Route de [[digue-de-huit|Digue]] modifiée. Cargaison de compensation en approche. Anomalie de masse non critique. Destination : Orseille démonstration.\n\nMaël ferma les yeux. Un bon contrat ne supprimait jamais le risque. Il décidait seulement qui le découvrirait trop tard."
  },

    "number": 6,
    "title": "Le Chant du verre",
    "pov": "Senn-de-Troisième-Marge",
    "place": "Orseille",
    "content": "[[orseille|Orseille]] chantait. Les apprentis d’Atelier-Clair apprenaient une maxime avant de toucher le verre : *ce qui chante trop tôt a déjà choisi son mensonge*. [[senn-de-troisieme-marge|Senn]] la trouva plus honnête que la plupart des clauses ouvertes devant lui.\n\nSenn n’avait pas trouvé d’autre mot, ce qui l’irritait. Les [[greffiers-de-parite|Greffiers de Parité]] évitaient les images quand elles n’ajoutaient pas de précision. Mais la cité chantait vraiment : dans les câbles tendus entre plateformes, dans les anneaux de mesure des artisans, dans les vibrations des lentilles suspendues derrière les murs. Chaque atelier avait son accord, chaque passerelle son timbre. À force de fabriquer des passages, Orseille avait donné une musique à la comparaison.\n\nIl arriva avec deux valises : une officielle, pleine de sceaux et de protocoles ; une privée, contenant la plaquette non certifiée et la quittance de sa mère. Dans le sas d’accueil, les filtres lui demandèrent de déclarer les objets biographiques. Il déclara la quittance. Il ne déclara pas la plaquette. La machine hésita une fraction trop longue avant de le laisser passer.\n\n[[dame-sio-d-atelier-clair|Dame Sio]] le reçut dans une salle moyenne, sans vue. Il apprécia ce mensonge de modestie.\n\n— Senn-de-Troisième-Marge. Votre section est réputée pour distinguer les erreurs utiles des erreurs arrogantes.\n\n— Ma section est surtout réputée pour manquer de personnel.\n\n— C’est parfois ainsi que l’intégrité survit.\n\nElle avait le charme dangereux des gens qui savent prononcer une critique comme un compliment. Sur la table, trois lentilles [[helianthe|Hélianthe]] attendaient dans des supports de verre noir. Senn posa ses instruments témoins : poussière de quartz tabulaire, fil de cuivre de [[digue-de-huit|Digue]], graine morte de [[serres-de-ronce-claire|Ronce-Claire]], eau lourde d’un bassin reconnu. Rien d’exotique. Une lentille honnête devait d’abord réussir les banalités.\n\nLes premiers tests furent parfaits. Pas simplement bons : parfaits avec des cicatrices. Hélianthe produisait de petites erreurs naturelles, juste assez irrégulières pour inspirer confiance. Senn nota le raffinement avec une admiration qu’il refusa d’appeler peur.\n\n— Elle imite la fatigue, dit-il.\n\n— Elle l’anticipe.\n\n— La différence est un tribunal.\n\nDame Sio inclina la tête.\n\nLe test suivant opposa le fil de cuivre à son registre de manutention. La lentille corrigea une microdivergence de température avant que l’instrument ne l’ait signalée. Senn arrêta la séquence.\n\n— Reprendre depuis l’état brut.\n\n— Inutile. Le seuil est inférieur à la marge.\n\n— Reprendre depuis l’état brut.\n\nLes artisans présents regardèrent Dame Sio. Elle autorisa. La lentille répéta le geste. Même précompensation. Senn sentit le [[blancs-reguliers|blanc régulier]] de la plaquette peser dans sa valise privée.\n\n— D’où vient la table de probabilité ?\n\n— De séries historiques.\n\n— Lesquelles ?\n\n— Plusieurs routes longues, des bassins reconnus, des retours d’Ancre archivés.\n\n— Ancre n’est pas une série historique. C’est une interdiction.\n\n— Une interdiction produit beaucoup de données quand tout le monde la contourne avec prudence.\n\nIl la regarda. Elle ne souriait plus.\n\n— Vous savez que je ne peux pas signer.\n\n— Je sais que vous pouvez refuser seul. Je sais aussi que le comité peut signer sans vous si le refus manque de forme.\n\n— Alors donnons-lui de la forme.\n\nIl lança un test croisé non prévu : graine morte de Ronce-Claire contre cuivre de Digue, sous lentille Hélianthe, avec eau de bassin comme témoin. Les artisans protestèrent. Dame Sio leva la main. La lentille accepta les données. Pendant neuf secondes, tout resta dans les seuils. Puis la graine morte germa.\n\nCe fut minuscule. Une fente verte, presque honteuse, au cœur d’un objet déclaré sans vie depuis vingt ans. Le cuivre vibra. L’eau lourde se troubla de particules noires. Dans la marge du test, une masse de cargaison apparut sans demande : vingt-sept huit, vingt-huit deux, vingt-sept huit.\n\nSenn recula d’un pas. Les instruments n’étaient pas reliés à la Digue. Aucune route active ne devait exister dans cette salle. La lentille venait de produire non une mesure, mais une relation.\n\n— Coupez, dit Dame Sio.\n\nPersonne ne bougea assez vite. Sur l’écran secondaire, un autre signal s’ouvrit : objet témoin en demande de [[chambre-de-passage|chambre]] certifiée, origine [[verrance|Verrance]] / Noyau audience. La procédure judiciaire d’[[ova-sous-cloture|Ova sous Clôture]], dont Senn avait lu le nom dans une note de veille, venait de toucher le test comme une main à travers un mur.\n\nLes artisans coupèrent enfin. La graine se referma sur sa pousse, mais la fente resta visible. Une erreur devenue botanique ne rentrait jamais complètement.\n\n— Vous avez intégré des couches judiciaires dans la lentille ? demanda Senn.\n\n— Non.\n\nDame Sio avait répondu trop vite pour mentir confortablement. Elle était aussi surprise que lui. Cela le terrifia davantage.\n\n[[mael-des-lignes-basses|Maël des Lignes-Basses]] entra sans frapper, accompagné d’un conseiller essoufflé. Les [[maisons-de-pli|Maisons]] avaient le don d’apparaître au moment où une faute cherchait un propriétaire.\n\n— La démonstration ne peut pas être retardée, dit-il.\n\nSenn rangea ses instruments.\n\n— Elle ne peut pas avoir lieu.\n\nMaël observa la graine fendue, le cuivre vibrant, l’eau troublée.\n\n— Combien de morts si vous bloquez ?\n\n— Combien de personnes transformées en bassin si je signe ?\n\nPour la première fois, le visage de Maël perdit son calcul. Pas longtemps. Assez.\n\n— Vous croyez que je ne les compte pas ?\n\n— Je crois que vous les comptez dans la mauvaise colonne.\n\nDame Sio posa la lentille Hélianthe dans un étui noir. Ses mains tremblaient très peu.\n\n— La démonstration est déjà annoncée sur six routes. Les chambres sont synchronisées. Les observateurs ont préparé leurs registres. Si nous annulons maintenant, nous créons presque autant d’[[ecart|Écart]] qu’un échec.\n\n— Phrase d’école inversée, dit Senn. Très belle. Très dangereuse.\n\nIl entendit Maude en lui et la détesta de lui avoir donné des mots utiles.\n\nSenn ouvrit une marge de refus sur son sceau officiel. Les lignes apparurent dans l’air : certification provisoire suspendue par anomalie relationnelle non bornée. Il ajouta, contre toutes les prudences, les références du test croisé, de Verrance, de la masse diguarde, et du blanc pré-Parité.\n\nAu moment de valider, sa valise privée sonna. La plaquette non certifiée venait d’être reconnue par la salle, bien qu’elle ne fût reliée à rien. Sa quittance maternelle, à côté, se fendit d’un trait si fin qu’il ne le vit d’abord pas.\n\nDame Sio murmura un mot d’atelier que les traducteurs refusèrent.\n\nDans les haut-parleurs de la cité, une voix annonça que la démonstration publique commencerait dans une heure."
  },

    "number": 7,

    "pov": "Lio de Sève-Retard",
    "place": "Route lente vers Orseille",
    "content": "[[lio-de-seve-retard|Lio]] découvrit que les transports de la [[digue-de-huit|Digue]] sentaient le métal fatigué et les promesses sans parfum. Sur la cloison, une phrase gravée à la main disait : *si ça fuit, nomme ; si ça ment, pèse ; si ça pleure, regarde d’abord*. La dernière proposition n’avait pas été ajoutée par une administration.\n\nIl avait quitté [[serres-de-ronce-claire|Ronce-Claire]] par une navette de récolte, puis vendu deux anneaux de famille à un convoyeur qui ne posait pas de questions tant que les réponses n’avaient pas de spores. Le rameau dormait contre sa poitrine dans une gaine de mousse humide. Les trois osselets minéraux cliquetaient parfois dans sa poche, comme des dents de morts contrariés. Derrière lui, les Serres négociaient sans doute leur innocence avec des gens qui avaient apporté des scellés réguliers pour voler ce qui n’existait pas.\n\nLe convoi lent vers [[orseille|Orseille]] n’était pas prévu pour des passagers [[ronceliers|ronceliers]]. Les sièges n’acceptaient qu’une posture. Les murs portaient des consignes en langue de Digue : si ça fuit, nomme ; si ça brûle, coupe ; si ça ment, pèse. Lio aimait malgré lui cette grammaire d’outil. Elle ne demandait pas aux choses d’être propres, seulement de se laisser réparer.\n\nIl partageait le compartiment avec trois mécaniciens endormis, une femme de la [[ligue-des-vivants-locaux|Ligue des Vivants Locaux]] qui tricotait des cordons de refus, et un enfant malade dans un caisson portatif. La mère de l’enfant ne cessait de vérifier les scellés médicaux. Les médicaments venaient d’une route de Maison. Lio reconnut sur les ampoules le marquage de Lignes-Basses.\n\nVoilà comment le monde tenait : une main vous volait une plante, l’autre apportait un traitement à un enfant qui respirait mal. Les histoires simples étaient des luxes de gens éloignés des sas.\n\nÀ la troisième veille, le rameau se réveilla.\n\nLa mousse devint froide. Lio ouvrit la gaine sous sa couverture. De minuscules racines avaient traversé le tissu et dessinaient sur sa peau des lignes qui n’étaient pas des veines. Il sentit une salle de verre noir, une graine morte qui germait, un fil de cuivre qui se souvenait de la Digue. Puis un corps dans un cylindre. Pas une vision complète : plutôt l’ombre d’une question cherchant un sol.\n\nLa femme de la Ligue leva les yeux de son tricot.\n\n— Tu portes une chose qui écoute trop loin.\n\nLio referma la gaine.\n\n— Et toi une chose qui juge trop vite.\n\n— Mes cordons ne jugent pas. Ils empêchent les [[chambre-de-passage|chambres]] de me réduire si je dois passer.\n\nElle montra le tricot : nœuds irréguliers, fibres différentes, petites perles d’os. Un objet volontairement trop biographique pour voyager bien. Un sabotage personnel.\n\n— Tu as peur du passage ? demanda Lio.\n\n— J’ai peur d’arriver utile et de laisser derrière moi ce qui n’a pas servi.\n\nIl n’eut pas de réponse. Les Ronceliers avaient d’autres mots pour cette peur, mais la racine était commune.\n\nUne secousse parcourut le transport. Les lumières passèrent au jaune. Une voix de Digue annonça un détour prioritaire vers Orseille démonstration. Les mécaniciens se réveillèrent en jurant avant d’être complètement conscients, ce que Lio prit pour un signe de professionnalisme.\n\nLe rameau battit plus fort. Dans le caisson médical, l’enfant ouvrit les yeux.\n\n— Il y a quelqu’un dans le froid, dit-il.\n\nSa mère se pencha, paniquée.\n\n— Repose-toi.\n\n— Il ne sait pas s’il est un objet.\n\nLe compartiment se tut. Lio sentit les racines du rameau s’enfoncer juste assez dans sa peau pour obtenir du sang. Les osselets dans sa poche devinrent chauds. Cuivre vert, silice fendue, fer noirci : les morts de Ronce-Claire reconnaissaient une personne quand les contrats hésitaient.\n\nUne trappe de service s’ouvrit. Une mécanicienne entra, visage sec, cheveux rasés sur un côté. Ses mains portaient des entailles de mémoire. Elle regarda le groupe, puis directement Lio.\n\n— Tu as quelque chose qui fait chanter notre cargaison.\n\n— Votre cargaison a commencé.\n\n— Réponse de serre. Je veux une réponse de fuite : est-ce que ça va nous tuer ?\n\nLio pensa à Arance, au [[droit-de-broussaille|droit de broussaille]], aux phrases qui protègent en ne donnant pas prise. Ici, le métal ne respectait pas les broussailles. Une mauvaise ambiguïté pouvait ouvrir une coque.\n\n— Je ne sais pas. Mais ce n’est pas une arme.\n\n— Sur la Digue, beaucoup de choses tuent sans être des armes.\n\nElle s’appelait Ilsa des Pompes. Elle le conduisit par des coursives trop étroites jusqu’à une soute de contrôle où les instruments affichaient deux masses alternées. Lio n’eut pas accès à la caisse ; il la sentit avant de la voir, derrière trois cloisons : froid blanc, sommeil contrarié, phrase ancienne. Le rameau allongea une racine vers la paroi.\n\n— Ne touche pas, dit Ilsa.\n\n— Ce n’est pas moi.\n\nLa racine s’arrêta à un centimètre du métal. Une buée apparut sur la cloison, puis des lettres en alphabet tabulaire ancien : ne pas simplifier sans deuil.\n\nIlsa jura si longuement que Lio admira la structure.\n\n— Le capitaine doit voir ça.\n\n— Où est-il ?\n\n— En train de faire semblant qu’un contrat n’est pas une corde autour de notre cou.\n\nLa cloison vibra. Le rameau ne cherchait pas à absorber l’[[ecart|Écart]] de la caisse ; il l’écoutait. Plus précisément, il mettait l’Écart en relation avec autre chose. Une plante n’était pas un bassin. Elle était un réseau de dépendances. Lio comprit brusquement son erreur : il avait voulu cacher une solution. Il portait peut-être un organe de traduction, une racine capable de retrouver où la divergence avait été arrachée.\n\n— Elle ne digère pas, murmura-t-il.\n\n— Tant mieux pour elle. Nous, on manque déjà de filtres.\n\n— Elle relie.\n\nIlsa le fixa.\n\n— Relier quoi à quoi ?\n\nLe transport gémit en entrant dans les champs d’Orseille. À travers un hublot, la géante gazeuse ouvrait ses couches dorées. Le rameau trembla si fort que la mousse se fendit. Lio vit, ou crut voir, une lune creuse pleine de rues incompatibles, une salle d’audience froide, une lentille noire, et sous tout cela une région d’[[delaisse-d-ancre|Ancre]] où des bâtiments non construits projetaient encore leur ombre.\n\n— À la dette, dit-il.\n\nLes alarmes de priorité retentirent. On leur ordonna de se préparer à l’arrimage. Ilsa attrapa Lio par l’épaule.\n\n— Si ton machin met le feu à une cité de verriers, je te jette dans leur plus beau vase.\n\n— Si leur vase était vide, nous ne serions pas ici.\n\nElle eut un rictus malgré elle.\n\nLe rameau, contre la cloison, produisit une petite feuille nouvelle. Sur sa surface, une ligne de texte apparut en nervures sombres. Lio ne connaissait pas les mots, mais il reconnut la forme d’une quittance.\n\nLes morts dans sa poche cessèrent de cliquer. Ils écoutaient aussi."

  {
    "number": 8,
    "title": "Admission provisoire",
    "pov": "Ova sous Clôture",
    "place": "Noyau des Tables / Verrance",
    "content": "[[ova-sous-cloture|Ova]] avait toujours pensé qu’un tribunal du [[noyau-des-tables|Noyau]] serait silencieux. Elle avait eu tort : un tribunal bruissait comme une laverie de [[verrance|Verrance]] les mauvais jours, quand les linges ressortaient avec les noms d’autres familles. Elle découvrit qu’il bruissait de corrections.\n\nChaque mot prononcé dans la salle passait par des marges actives, des filtres de recevabilité, des miroirs de contradiction. Le silence apparent était un travail continu : hésitations élaguées, respirations mises hors dossier, nuances classées comme ton, non comme fait. Les juges siégeaient sous trois horloges seulement, luxe presque indécent comparé aux douze des salles d’audit. Les Tables savaient se montrer simples quand elles jugeaient la complexité des autres.\n\nOva n’était présente que par faisceau. Son corps restait à Verrance, dans une cabine d’antenne où deux techniciens surveillaient les saisons du quartier. Mais elle avait exigé que sa voix ne soit pas lissée. On lui avait accordé une rugosité limitée.\n\n— La requête, dit la juge centrale, vise à faire reconnaître que plusieurs versions d’une même catastrophe peuvent ouvrir réparation sans hiérarchie préalable. Confirmez-vous ?\n\n— Je confirme, à condition que “même” ne serve pas à réduire ce qui est en cause.\n\nUne marge jaune s’alluma : réserve sémantique excessive. Ova sourit sans le montrer.\n\nLe représentant des [[greffiers-de-parite|Greffiers]] plaida le premier. Il parla de solidarité matérielle, de routes, de seuils, du danger d’indemniser des versions non closes. Il ne fut pas méprisant. C’était presque pire. Il comprenait assez Verrance pour la rendre administrable.\n\nPuis vint [[mael-des-lignes-basses|Maël des Lignes-Basses]], admis comme partie économique au nom des routes affectées. Ova l’avait imaginé gras de privilèges. Il était mince, fatigué, avec le regard de quelqu’un qui compte en dormant.\n\n— Les [[maisons-de-pli|Maisons]] ne contestent pas les souffrances, dit-il. Nous contestons l’illimitation juridique. Si toute divergence devient indemnisable sans ordre, les contrats qui maintiennent les passages vitaux s’effondrent. Et avec eux les traitements, les pièces, les récoltes.\n\nOva nota qu’il disait les traitements avant les profits. Peut-être par stratégie. Peut-être parce qu’il y croyait. Les antagonistes honnêtes étaient les plus coûteux.\n\n— Vous demandez aux victimes de rester pauvres en versions pour que vos contrats restent riches en routes, répondit-elle.\n\n— Je demande que la réparation ne détruise pas ce qui permet encore de réparer.\n\n— Vous appelez réparer le fait d’envoyer la dette chez nous.\n\nMaël ne répondit pas immédiatement. Un bon plaideur aurait profité de ce silence. Ova le laissa, parce qu’elle voulait savoir s’il savait.\n\n— Je n’ai pas choisi Verrance, dit-il enfin.\n\n— Non. Vous l’avez seulement tarifée.\n\nLes marges de la salle s’agitèrent. La juge rappela les parties à la structure. On demanda l’objet témoin. Ova posa la pierre noire dans le socle de Verrance ; son image apparut au Noyau. Les capteurs refusèrent d’abord la chaîne de possession. Puis la pierre vibra, et les refus devinrent contradictoires.\n\n[[senn-de-troisieme-marge|Senn-de-Troisième-Marge]] fut appelé comme expert. Ova l’observa pendant qu’il entrait dans le faisceau : robe grise, visage tendu, une précision presque douloureuse dans la manière de poser ses mains.\n\n— Greffier, dit la juge, cette pierre peut-elle être admise comme matériau témoin ?\n\nIl regarda les données. Longtemps.\n\n— Non, selon les critères ordinaires.\n\nOva sentit le dossier s’effondrer d’une hauteur qu’elle avait pourtant anticipée.\n\n— Et selon les critères extraordinaires ? demanda la juge.\n\n— Ils n’existent pas encore.\n\n— Votre conclusion ?\n\nSenn leva les yeux vers Ova, ou vers l’endroit où son faisceau le représentait.\n\n— Si nous la refusons comme objet, nous devons expliquer pourquoi des personnes présentant les mêmes incohérences restent justiciables. Si nous l’admettons, nous devons admettre que nos [[chambre-de-passage|chambres]] ne savent pas distinguer certains témoins de certaines victimes.\n\nLa salle se figea. Ova reconnut une main tendue, mais aussi un piège : les Tables pouvaient transformer cette réflexion en commission, puis en délai, puis en archive.\n\n— Alors ne distinguez pas trop vite, dit-elle. C’est précisément notre demande.\n\nLe représentant des Greffiers protesta. Maël demanda une suspension technique. La juge centrale refusa les deux, non par sympathie, mais parce que la contradiction était devenue trop visible pour être rangée sans forme.\n\nOva ouvrit alors la partie du dossier qu’elle avait prévu de garder scellée : les corrections automatiques subies pendant le transfert, les naissances déplacées vers une [[couche-non-admise|couche non admise]], la voix d’[[iram-sans-suture|Iram]] prononçant une [[declaration-d-ame|déclaration d’âme]] ancienne. Les marges passèrent du jaune au rouge.\n\n— Vous introduisez des éléments non stabilisés, dit la juge.\n\n— Je suis née dans un lieu où la stabilité des autres arrive sous forme de maladie. Je n’ai pas d’éléments stabilisés. J’ai des éléments vrais assez longtemps pour blesser.\n\nCe fut la première phrase de la journée que les marges ne surent pas qualifier.\n\nAu même moment, la pierre noire se leva d’un millimètre au-dessus du socle. Elle ne flottait pas : elle hésitait entre deux poids. Sur un écran latéral, une alerte venue d’[[orseille|Orseille]] s’ouvrit sans autorisation. Test de lentille. Graine morte active. Masse diguarde alternée. Relation non bornée.\n\nLe nom de Senn apparut dans l’alerte. Puis celui de Lignes-Basses. Puis une mention de rameau végétal.\n\nMaël pâlit. Senn ferma les yeux comme un homme qui vient d’entendre son propre doute parler depuis une autre pièce.\n\nLa juge centrale demanda la coupure de liaison. Les techniciens n’y parvinrent pas.\n\nOva sentit Verrance derrière son dos : rues qui changeaient d’ordre, enfants aux naissances corrigées, témoins assis sur des chaises destinées à d’autres versions. Elle comprit que la pierre n’était pas là pour prouver seulement le passé. Elle appelait une chambre où le présent commettait la même faute sous une forme neuve.\n\n— Admission provisoire, dit la juge d’une voix dure.\n\nLe représentant des Greffiers se tourna vers elle, stupéfait.\n\n— Pour quel motif ?\n\n— Pour éviter que le refus lui-même devienne une preuve incontrôlée.\n\nOva aurait pu savourer. Elle n’en eut pas le temps. L’alerte d’Orseille se changea en compte à rebours public. Une démonstration allait commencer. La pierre noire, dans son socle, produisit une fissure nette. De la fissure sortit une buée froide, et dans cette buée une phrase en lettres anciennes : rendre la dette ne signifie pas payer deux fois.\n\nAucune marge ne corrigea la phrase."
