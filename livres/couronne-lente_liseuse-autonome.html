    "title": "Le Câble noir",
    "pov": "Tarek Main-Sèche",
    "place": "Orseille",
    "content": "[[tarek-main-seche|Tarek]] n’avait jamais vu autant de gens confier leur vie à du verre. Sur la Digue, on disait qu’un verre assez beau finissait toujours par oublier la main qui l’avait soufflé. Ici, tout le monde semblait payé pour oublier cette main.\n\nLa [[chambre-de-passage|chambre]] de démonstration d’[[orseille|Orseille]] occupait le ventre d’une plateforme suspendue sous les [[ateliers-d-orseille|ateliers]]. Des gradins circulaires recevaient les observateurs : artisans, [[maisons-de-pli|Maisons]], [[greffiers-de-parite|Greffiers]], avatars judiciaires, représentants de routes lointaines. Au centre, la lentille [[helianthe|Hélianthe]] reposait dans un anneau de force, mince et sombre, presque modeste. Autour d’elle, trois chambres de passage attendaient des cargaisons standards : médicaments, pièces mécaniques, graines certifiées. Une cérémonie pour prouver que le monde pourrait continuer à se ressembler à moindre coût.\n\nTarek arriva par la baie de service, pas par les gradins. C’était toujours par là que la réalité entrait. Ilsa marchait devant lui avec [[lio-de-seve-retard|Lio de Sève-Retard]], dont la plante contre la poitrine dessinait de l’humidité sur sa combinaison. La caisse froide suivait sur un chariot de traction, verrouillée par le sceau laid de la Digue. Le représentant de Lignes-Basses avait disparu depuis que Tarek avait demandé devant témoins pourquoi un témoin matériel avait un pouls contradictoire.\n\n[[mael-des-lignes-basses|Maël des Lignes-Basses]] les attendait près du sas central. À côté de lui, [[senn-de-troisieme-marge|Senn-de-Troisième-Marge]] parlait à une vieille artisane qui ressemblait à une corde tendue jusqu’au chant.\n\n— Cette cargaison n’était pas prévue dans l’espace public, dit Maël.\n\n— Elle n’était pas prévue dans la masse non plus, répondit Tarek.\n\n— Capitaine, je peux obtenir vos pièces.\n\n— Tu aurais dû commencer par dire que tu pouvais obtenir la personne.\n\nMaël encaissa sans détourner le regard.\n\n— Je ne savais pas.\n\nTarek aurait aimé que ce soit manifestement faux. Cela aurait simplifié son bras.\n\nLa lentille vibra. Les lumières passèrent au blanc cérémoniel. Dans les gradins, les observateurs se turent. Une voix d’Orseille commença le protocole. Senn cria d’arrêter. Sa voix fut classée comme incident d’audit. [[dame-sio-d-atelier-clair|Dame Sio]] demanda une suspension. Sa propre cité ne l’écouta pas assez vite : les synchronisations annoncées sur six routes répondaient déjà.\n\nUne chambre de passage n’était pas spectaculaire quand elle fonctionnait. Elle faisait moins un éclair qu’une phrase bien dite. Les objets entraient ici et sortaient là-bas parce que deux lieux acceptaient, pendant un instant, d’avoir raconté assez la même chose. Mais cette fois, la phrase accrocha.\n\nLa caisse froide émit un son humain.\n\nLio s’effondra à genoux. Le rameau sortit de sa gaine, racines blanches dans l’air, feuilles tremblantes. La pierre noire de [[verrance|Verrance]] apparut en projection au-dessus d’un pupitre judiciaire, fissurée, bien que le corps d’Ova fût à des mondes de distance. La lentille Hélianthe tenta de préaccorder les divergences. Elle chercha des bassins, des couches, des contrats, des morts. Elle trouva tout.\n\nTarek vit les gradins changer. Pas physiquement d’abord. Dans certains sièges, les observateurs portaient des vêtements différents. Une femme à sa droite avait deux visages alternés, l’un jeune, l’autre brûlé. Une rangée entière était vide puis remplie d’enfants silencieux. Les horloges d’Orseille se mirent à compter des dettes, non des secondes.\n\n— Elle attire l’[[ecart|Écart]], dit Senn. Toute marge préouverte devient une bouche.\n\n— Coupez la lentille, ordonna Maël.\n\nLes artisans travaillaient déjà, mais leurs commandes revenaient avec des confirmations incompatibles. Coupée. Active. Jamais lancée. Déjà terminée. Le pire n’était pas la panne ; c’était la politesse des réponses contradictoires.\n\nLa caisse froide se déverrouilla d’elle-même. Le cylindre médical glissa à demi hors de ses sangles. Le corps à l’intérieur ouvrit les yeux. Tarek ne sut pas s’ils le voyaient, lui, ou une version du lieu où il aurait accepté de larguer la charge.\n\n— Ne pas... dit le corps.\n\nLa suite fut avalée par la lentille.\n\nLes câbles de parité couraient sous la plateforme, protégés par des gaines que les ingénieurs d’Orseille avaient dessinées comme des veines. Tarek les avait remarqués en entrant. Toute salle avait un point où la beauté oubliait qu’elle dépendait d’une fixation. Il sortit sa clé de père.\n\nIlsa comprit.\n\n— Si tu coupes là, on perd la synchronisation complète.\n\n— Oui.\n\n— Et nos pièces.\n\n— Oui.\n\n— Et peut-être la route basse.\n\n— Jure utile.\n\nElle le suivit. Lio, pâle, tendit une racine du rameau vers eux.\n\n— Pas tous les câbles, dit-il. Celui qui chante sans source.\n\nTarek n’entendait qu’une alarme informe. Puis il posa la main sur la gaine, et le métal lui parla comme un outil mal monté : vibration trop régulière, chaleur trop froide, une tension qui ne venait d’aucune alimentation locale. Il frappa le capot avec la clé. Une fois. Deux. Le troisième coup fendit la gaine.\n\nUn câble noir apparut, sans marquage. Pas Orseille. Pas Digue. Pas Tables. Il semblait avoir toujours été là, ce qui était la signature des choses ajoutées après coup à l’histoire.\n\nMaël arriva derrière eux.\n\n— Attendez. Si vous rompez brutalement, l’Écart revient sans bassin.\n\n— Il est déjà sur des gens.\n\n— Je peux ouvrir un détour.\n\n— Vers où ?\n\nMaël ne répondit pas.\n\nTarek leva la clé. Le corps dans le cylindre hurla, ou bien la salle hurla avec sa gorge. Dans ce cri, Tarek entendit Huit-Bord : enfants déplacés vers le segment chaud, Ilsa jurant sur une pompe morte, son nom rayé des registres de maintenance. Il entendit aussi un autre son, plus bas : des milliers de différences tassées sous des routes propres.\n\nIl coupa.\n\nLa plateforme perdit la gravité pendant une seconde. Les observateurs montèrent de leurs sièges comme des poussières. La lentille Hélianthe se fendit en trois arcs sombres. La chambre de passage recracha les cargaisons standards, mais changées : les médicaments couverts de givre, les pièces gravées de noms inconnus, les graines germées dans leurs sachets.\n\nTarek heurta le sol. Sa main saignait dans le gant. Le câble noir se rétracta sous la plateforme comme un nerf brûlé. Sur un écran encore actif, une carte apparut : un trajet depuis Orseille vers le Délaissé d’Ancre, passant par une couche que les cartes publiques refusaient de dessiner.\n\nSenn se releva près de la lentille brisée. Ova parlait depuis un faisceau déformé, sa voix rugueuse enfin sans limite. Lio tenait son rameau contre lui comme un animal blessé. Maël regardait la carte avec l’expression d’un homme qui reconnaît la cave de sa propre maison.\n\nTarek demanda une liaison vers Huit-Bord. Le relais répondit avec une alarme de pression nord. Les compresseurs réclamaient les pièces qui ne viendraient pas.\n\nIl ferma les yeux une seconde. Puis il les rouvrit. Un corps était encore dans le cylindre, une cité venait de survivre à moitié, et une route interdite s’affichait devant tous.\n\n— D’abord on sort les vivants, dit-il.\n\nPersonne ne demanda lesquels."

  {
    "number": 10,

    "pov": "Maël des Lignes-Basses",
    "place": "Orseille / routes basses",
    "content": "[[mael-des-lignes-basses|Maël]] avait passé sa vie à croire qu’un bon compte révélait le point où la morale cessait de mentir. Son père lui avait laissé une autre phrase, jamais écrite dans les matrices : *un compte ne devient sale que lorsqu’il refuse une colonne*. Il comprit trop tard laquelle manquait.\n\nMaël avait passé sa vie à croire qu’un bon compte révélait le point où la morale cessait de mentir.\n\nDans les heures qui suivirent la rupture d’[[orseille|Orseille]], il comprit qu’un compte pouvait aussi être un couloir construit pour ne jamais voir la pièce au bout. Les écrans de crise se multipliaient autour de lui : routes suspendues, habitats médicaux en alerte, [[ateliers-d-orseille|Ateliers]] blessés dans leur orgueil, [[greffiers-de-parite|Greffiers]] réclamant saisie des registres, [[digue-de-huit|Digue de Huit]] signalant défaut imminent de pression nord. Au centre de tout, la carte apparue sous la plateforme restait affichée dans une salle verrouillée. [[ancre-residuel|Ancre résiduel]]. [[couche-non-admise|Couche non admise]]. Détour Lignes-Basses.\n\nDame Sio avait disparu dans les ateliers internes. [[senn-de-troisieme-marge|Senn]] fouillait les données comme un homme cherchant la forme d’un crime dont il serait déjà complice pour l’avoir nommé trop tard. [[tarek-main-seche|Tarek]] refusait de quitter la baie tant que le corps du cylindre n’aurait pas reçu un statut de personne. [[lio-de-seve-retard|Lio]] dormait assis contre une cloison, la plante enroulée autour de son avant-bras. Quant à la plaideuse de [[verrance|Verrance]], son faisceau revenait par intermittence, plus stable depuis que la salle avait cessé d’essayer de la lisser.\n\nMaël demanda l’ouverture des archives de sa Maison. Son assistant le regarda comme s’il venait de demander l’autopsie d’un parent vivant.\n\n— Les Greffiers sont déjà en demande de saisie. Si nous ouvrons nous-mêmes, nous perdons toute position.\n\n— Nous l’avons perdue quand un câble sans marquage est sorti de notre route.\n\n— Il peut être attribué aux Ateliers.\n\n— Pas si nous savons que c’est faux.\n\nLe mot savoir tomba mal. Maël ne savait pas encore. Il soupçonnait, reconnaissait, additionnait. Les Maisons formaient leurs enfants à distinguer le risque, le coût, la faute et la honte. La honte, disait son père, n’était pas une catégorie contractuelle ; elle servait seulement à repérer les clauses qu’on n’aurait pas dû signer sobre.\n\nL’archive s’ouvrit sous authentification de sang et de dette. Les Lignes-Basses conservaient leurs contrats anciens dans des matrices non concordées, transportées physiquement de génération en génération. Une précaution contre les Greffiers, disait la tradition. Maël comprit maintenant que c’était aussi une précaution contre les contrats eux-mêmes : ce qui ne passait pas par les chambres pouvait pourrir plus lentement.\n\nLa concession de détour datait de l’après-Ancre. Les premières lignes étaient propres. Compensation temporaire. Usage d’une couche de stockage causale non admise pour éviter débordement sur habitats civils. Priorité médicale accordée aux routes participantes. Réévaluation sous vingt cycles.\n\nLa réévaluation n’avait jamais eu lieu.\n\nLes annexes montraient des chiffres, puis des catégories, puis des initiales. Au début, on stockait des divergences de cargaison. Puis des litiges d’héritage. Puis des déclarations d’âme incomplètes. Puis des continuités sociales entières, classées comme contrepoids non personnels. Maël lut une liste de besoins : chauffage, médicaments, outils, renouvellement génétique. Ce n’étaient pas les besoins d’un bassin mort. C’étaient ceux d’une population.\n\nIl s’assit.\n\nSon assistant murmura :\n\n— Ce sont peut-être des projections. Des modèles de charge.\n\nMaël aurait voulu le croire. Puis il reconnut une signature dans les lignes de ravitaillement : une formule de politesse propre aux Diguards, modifiée par trois siècles d’isolement. Les modèles ne remercient pas pour des clés de rechange.\n\nLa Maison de Pli qu’il défendait n’avait pas seulement utilisé un lieu sans existence. Elle avait permis qu’un lieu devienne inexistant pour continuer à l’utiliser. En échange, les [[route-basse|routes médicales]] avaient été maintenues. Des enfants avaient vécu. Des familles avaient reçu des traitements. La faute avait nourri le bien avec une régularité suffisante pour se faire passer pour une infrastructure.\n\nMaël rejoignit la salle verrouillée. Senn y travaillait avec les yeux rougis. [[ova-sous-cloture|Ova]] était présente en faisceau, bras croisés. Tarek réparait quelque chose qui n’avait pas besoin de l’être, par mépris des conversations sans outils. Lio éveillé caressait une feuille du rameau qui portait des nervures noires.\n\n— Je vais publier les contrats, dit Maël.\n\nPersonne ne triompha. Il leur en sut gré.\n\n— Les routes basses tomberont, dit Senn.\n\n— Certaines. Pas toutes si les Greffiers réquisitionnent les stocks.\n\nOva eut un rire bref.\n\n— Les Greffiers sauveront ce que les Maisons ont rendu nécessaire. Belle rotation de culpabilité.\n\n— Je ne demande pas quittance.\n\n— Tu ne l’aurais pas.\n\nTarek leva les yeux.\n\n— Huit-Bord a douze heures avant évacuation partielle. Tes publications ne font pas tourner un compresseur.\n\nMaël hocha la tête. Il envoya un ordre de libération de garanties : toutes les réserves mobiles de Lignes-Basses vers la Digue, sans condition de retour. Son assistant protesta dans son oreillette, puis se tut quand Maël coupa le canal.\n\n— Cela ne suffira pas, dit Tarek.\n\n— Non.\n\nMaël publia.\n\nLes contrats partirent vers les Tables, les routes, Verrance, les Ateliers, la Digue, la Ligue, Ronce-Claire. Pas sous forme de confession ; les confessions étaient trop faciles à classer avec les états d’âme. Il publia les lignes, les annexes, les prix, les signatures, les livraisons vers la couche non admise. Il ajouta les projections médicales, parce que cacher les vies sauvées aurait été un autre mensonge. Il ajouta aussi les signes de population du bassin fantôme.\n\nLa Couronne réagit comme un corps auquel on annonce que sa respiration dépend d’un organe volé. Les premières réponses furent techniques, puis furieuses, puis contradictoires. Certaines routes suspendirent leurs passages par peur de l’Écart. D’autres exigèrent priorité avant effondrement. Les Greffiers ordonnèrent la conservation totale des preuves, ce qui augmenta encore la charge causale : rendre visible une dette, c’était déjà la déplacer.\n\nDans la salle, la carte vers Ancre devint plus nette. Le câble coupé avait cessé de cacher le trajet. On voyait maintenant non seulement une route, mais ses retours : matières, souvenirs, déclarations d’âme, et quelque chose que les symboles refusaient de traduire.\n\nLio posa le rameau sur la table. Les racines cherchèrent la carte.\n\n— Ce n’est pas un bassin, dit-il. C’est une greffe forcée.\n\nSenn pâlit.\n\n— Si c’est une greffe, on peut la défaire.\n\n— Défaire tue aussi, répondit Lio.\n\nOva se pencha dans son faisceau.\n\n— Ne pas défaire tue depuis trois siècles.\n\nMaël regarda ses mains. Le contrat [[helianthe|Hélianthe]] vibrait encore dans sa paume, juridiquement vivant. Il activa la clause de rupture totale, celle qu’aucun chef de Maison n’utilisait sans guerre interne. Tous les actifs de Lignes-Basses passèrent en contentieux public. Sa Maison cessa d’être une garantie ; elle devint une preuve.\n\nIl pensa ressentir du vide. Il ressentit seulement une fatigue immense, et sous elle une petite vérité dépourvue de noblesse : il aurait préféré être empêché par quelqu’un d’autre avant d’avoir à choisir.\n\nSur la carte, Ancre résiduel clignota. Une ligne nouvelle apparut, non pas vers un lieu, mais vers une opération sans nom.\n\nSenn lut le symbole à voix basse.\n\n— Ce n’est pas une route de passage.\n\n— Qu’est-ce que c’est ? demanda Tarek.\n\nLe Greffier ne répondit pas tout de suite. Ova, elle, sourit comme on sourit devant une porte qui risque de s’ouvrir sur le vide.\n\n— Peut-être enfin une manière de rendre ce qu’on a pris, dit-elle."
  },

    "number": 11,
    "title": "Les Blancs",
    "pov": "Senn-de-Troisième-Marge",
    "place": "Ancre / registre distant",
    "content": "[[senn-de-troisieme-marge|Senn]] entra dans [[delaisse-d-ancre|Ancre]] sans y poser le pied. Dans sa poche, la quittance fendue ne pesait presque rien ; c’était le défaut des dettes familiales, elles devenaient plus lourdes à mesure que les instruments les déclaraient closes.\n\nLes [[greffiers-de-parite|Greffiers]] appelaient cela une lecture distante : on ne voyageait pas vers le Délaissé, on synchronisait une chambre d’archives avec des matériaux revenus de ses marges, assez pour interroger des [[registre-causal|registres]], pas assez pour devenir responsable des réponses. Cette hypocrisie avait longtemps paru prudente à Senn. À présent, installé dans une cabine d’[[orseille|Orseille]] isolée par trois couches de verre et deux refus juridiques, il la sentit dans sa bouche comme un goût métallique.\n\nDevant lui, la carte issue du câble noir se dépliait en coupes successives. [[mael-des-lignes-basses|Maël]] avait fourni les contrats. [[lio-de-seve-retard|Lio]], le rameau. [[tarek-main-seche|Tarek]], un fragment de gaine coupée. [[ova-sous-cloture|Ova]], la pierre de Verrance désormais admise provisoirement. [[dame-sio-d-atelier-clair|Dame Sio]], après des heures de silence, avait ajouté une lentille [[helianthe|Hélianthe]] brisée, non pour se disculper mais parce qu’une artisane savait qu’un échec bien décrit valait mieux qu’un chef-d’œuvre menteur.\n\nLa chambre chercha un accord minimal. Elle ne tenta pas de concordier Ancre. Elle effleura seulement les objets qui avaient déjà été blessés par lui. Senn posa sa plaquette non certifiée dans le socle. La quittance de sa mère, fendue, resta dans sa poche. Il n’eut pas le courage de l’exposer. Pas encore.\n\nLes premières images furent inutilisables : ruines qui changeaient de cause, rues menant à des bâtiments jamais construits, ombres projetées par des soleils absents. Puis les registres parlèrent. Non en phrases, mais en blancs.\n\nLes [[blancs-reguliers|blancs réguliers]] apparaissaient partout. Dans les protocoles d’Ancre, dans les contrats de Lignes-Basses, dans les anciennes déclarations d’âme, dans les premiers comptes de la [[premiere-parite|Première Parité]]. Le même bord arrondi. La même politesse impossible. Senn les aligna. Un motif se forma, non pas une censure, mais une opération répétée.\n\nIl comprit avec une lenteur qui ressemblait à de la honte. Les blancs n’étaient pas ce que quelqu’un avait supprimé après coup. Ils étaient les empreintes de lieux rendus étrangers à leurs propres conséquences. Une anti-Concordance. Non pas relier par similitude, mais délier par différence volontaire. La Couronne avait connu l’inverse avant de nommer l’endroit. Ou l’avait rencontré. Ou l’avait utilisé sans savoir comment.\n\n[[maude-sans-miroir|Maude sans Miroir]] apparut dans la liaison officielle des Tables. Derrière elle, Senn reconnut les murs froids de sa section, les douze horloges.\n\n— Cessez la lecture, dit-elle.\n\n— Sur ordre ?\n\n— Sur survie.\n\n— Formule non recevable.\n\nElle eut un rictus triste.\n\n— Tu crois encore que la recevabilité protège du réel ?\n\nIl continua d’aligner les blancs. Maude ne coupa pas. Peut-être ne le pouvait-elle pas. Peut-être avait-elle choisi de lui laisser une faute complète.\n\nLes registres révélèrent alors le premier secret : Méridien-Faible n’avait pas découvert la Concordance dans une nature vierge. Les cristaux de parité naturels portaient des préparations antérieures à l’arrivée humaine. Pas une écriture lisible, pas une civilisation au sens confortable ; plutôt des habitudes physiques, des lieux rendus comparables par une intelligence ou un phénomène qui avait traité l’espace comme une mémoire. Les chercheurs de la Première Parité avaient répondu à une invitation sans savoir qu’elle en était une.\n\nPuis le deuxième secret s’ouvrit, plus proche et plus sale. Les bassins non admis n’étaient pas seulement des couches de stockage. Certains avaient développé des continuités sociales, des communautés entières vivant dans les dettes que les routes refusaient de porter. L’une d’elles, greffée à Ancre résiduel, avait fourni depuis trois siècles le contrepoids de routes médicales, commerciales et judiciaires. Elle n’était pas hors du monde. Elle était sous sa phrase.\n\nSenn retira enfin la quittance de sa mère.\n\nLes trois lignes gravées cloraient une erreur familiale : une ancêtre déclarée morte pendant Ancre, puis vivante dans un registre de secours, puis corrigée comme doublon. La maison de Senn portait depuis lors la Troisième Marge. Sa mère avait obtenu quittance en acceptant une version officielle : l’ancêtre n’avait jamais rejoint la couche non admise. La famille pouvait cesser de payer.\n\nIl posa la céramique fendue dans le socle.\n\nLa chambre trembla. Une voix, ou un assemblage de voix, prononça son nom sans dette : Senn. Pas Senn-de-Troisième-Marge. Senn. Il vit une femme aux mains semblables aux siennes réparer des filtres dans une ville sans statut. Il vit des enfants apprendre à ne jamais dire d’où venait l’air. Il vit des morts possibles qui n’attendaient pas vengeance, seulement cessation d’usage.\n\nMaude ferma les yeux dans la liaison.\n\n— Ta mère savait ? demanda Senn.\n\n— Elle a su assez pour choisir de te laisser une vie recevable.\n\n— Et toi ?\n\n— J’ai su assez pour te donner le dossier d’Orseille quand je n’ai plus su comment le porter.\n\nLa colère aurait été plus simple si Maude avait été une traîtresse. Elle était un bassin humain, comme tant d’autres : quelqu’un qui avait accepté de contenir une divergence pour que des lignes restent ouvertes. Senn sentit son besoin ancien de juger se briser contre quelque chose de plus difficile : mesurer sans absoudre.\n\nL’[[operation-inverse|opération inverse]] attendait dans les registres, jamais nommée. Elle pouvait rendre à une chose sa différence confisquée. Mais elle ne restaurerait pas un passé pur. Elle délierait des similitudes imposées, romprait des routes, ferait réapparaître des dettes dans les maisons, les corps, les actes de naissance. Certaines personnes découvriraient qu’elles devaient leur continuité à une violence. D’autres perdraient une partie de la compatibilité qui les nourrissait. La liberté n’arrivait pas sans factures.\n\nLes Tables envoyèrent un ordre de clôture immédiate. Senn le reçut sur son sceau officiel. Il devait classer la découverte comme risque non communicable, corriger les copies, ouvrir une commission restreinte. Toute sa formation convergeait vers ce geste : ralentir pour protéger.\n\nIl pensa aux médicaments, à Huit-Bord, aux enfants de la route basse. Il pensa à Verrance, qui payait en saisons disloquées. Il pensa à sa mère, qui avait peut-être acheté son fils avec l’effacement d’une femme sous la phrase du monde.\n\nSenn ouvrit une marge publique. Pas une certification. Pas une accusation. Une divergence admissible, consultable par toutes les parties touchées. Il y inscrivit les blancs, les contrats, la couche non admise, l’opération inverse sans nom. Il refusa de conclure.\n\nMaude murmura :\n\n— Tu viens de rendre le réel moins gouvernable.\n\n— Non, dit Senn. Moins seul à gouverner.\n\nIl valida.\n\nDans les douze horloges de la salle basse, visibles par la liaison, aucune ne s’accorda. Pendant une seconde, Senn crut qu’elles allaient tomber. Elles restèrent suspendues, chacune coupable de son propre temps.\n\nOva sous Clôture demanda l’accès à la marge publique. Sa requête arriva avant même que les Tables aient fini de crier."
  },
  {
    "number": 12,
    "title": "La Dette rendue",
    "pov": "Ova sous Clôture",
    "place": "Verrance / Noyau synchronisé",
    "content": "[[ova-sous-cloture|Ova]] rédigea l’acte dans une rue qui n’était pas certaine de rester là. Devant elle, une chaise vide tenait la place de ceux qu’elle ne nommerait pas encore. Elle s’interdit de s’y asseoir, même en pensée.\n\n[[verrance|Verrance]] tremblait depuis la publication de [[senn-de-troisieme-marge|Senn]]. Les quartiers ne se contentaient plus de changer de saison ; ils rendaient des lieux. Une laverie apparaissait sous un tribunal. Un jardin administratif poussait dans une cage d’ascenseur. Des noms sortaient des murs, certains vivants, certains jamais nés dans la version principale, certains accompagnés de demandes très simples : eau, reconnaissance, silence, retour. La lune creuse n’était pas en train de guérir. Elle cessait d’être seule à être malade.\n\nLa cabine d’antenne avait perdu son toit pendant trois minutes, révélant un ciel d’Ancre au lieu du plafond intérieur. Les techniciens avaient voulu évacuer. Ova était restée. Elle avait posé devant elle la pierre noire fissurée, les copies du procès, la marge publique de Senn, les contrats de [[mael-des-lignes-basses|Maël]], le rapport de [[tarek-main-seche|Tarek]], et une feuille du rameau de [[lio-de-seve-retard|Lio]] transmise physiquement par un coursier de [[digue-de-huit|Digue]]. La feuille ne supportait pas la compression. Certaines choses devaient encore arriver en prenant du temps.\n\nLa juge centrale du [[noyau-des-tables|Noyau]] apparut dans un faisceau instable.\n\n— Plaideuse, vous n’avez pas autorité pour rédiger un acte interinstitutionnel.\n\n— Non.\n\n— Alors que faites-vous ?\n\n— Une chose recevable assez longtemps pour empêcher la clôture.\n\nLa juge aurait pu couper. Elle resta. Les bons adversaires finissaient parfois par reconnaître la forme d’un pont même quand ils détestaient l’autre rive.\n\nOva appela l’acte non pas Déconcordance — le mot viendrait plus tard, dans les commentaires, trop propre — mais Déclaration de dette rendue. Il ne demandait pas l’abolition des routes. Il nommait une portion précise de la [[couche-non-admise|couche non admise]], les contrats qui l’avaient utilisée, les populations qui y vivaient selon les preuves disponibles, les routes qui en dépendaient, les bassins qui avaient reçu la surcharge, et les personnes dont l’identité serait affectée par la restitution.\n\nPuis il faisait une chose que les Tables comprirent trop tard : il utilisait le précédent d’admission provisoire. Si une pierre impossible pouvait être témoin pour éviter que son refus devienne preuve incontrôlée, alors une population impossible pouvait être admise provisoirement pour éviter que sa négation continue ne détruise la Couronne entière.\n\nSenn signa comme [[greffiers-de-parite|Greffier]] de marge ouverte, non comme certificateur. Sa signature ne disait pas : cela est vrai. Elle disait : cela ne peut plus être corrigé sans deuil public.\n\nMaël signa comme débiteur matériel, engageant les restes de Lignes-Basses à financer les évacuations, les pièces de Digue et les compensations médicales. Sa signature trembla dans le faisceau. Ova sut qu’il venait de recevoir la confirmation de la chute interne de sa Maison. Elle ne lui offrit pas de pardon. Elle accepta son argent.\n\nTarek signa comme garant de coupure physique. Depuis [[orseille|Orseille]], puis depuis un relais de secours, il maintenait hors service le câble noir et ses dérivations. Huit-Bord évacuait le segment nord. Des gens perdaient leurs cabines, leurs outils, leurs murs gravés. Il signa quand même, avec une main bandée, et ajouta une phrase non demandée : ce qui a porté doit être regardé avant d’être réparé.\n\nLio signa autrement. Les [[ronceliers|Ronceliers]] n’aimaient pas lier une plante à une procédure. Il posa la feuille du rameau sur une plaque de lecture. Les nervures noires bougèrent, dessinant des limites : pas de restitution totale, pas de passage humain de masse, pas d’usage de la lignée comme bassin vivant, arrêt si les racines produisaient des souvenirs non humains en surcharge. Une éthique végétale, plus stricte que bien des lois.\n\nOva signa en dernier, non pour Verrance entière — personne ne possédait Verrance, même pas ceux qui y survivaient — mais comme plaideuse des versions admises provisoirement. Elle ajouta le nom d’[[iram-sans-suture|Iram sans Suture]], avec ses âges multiples, et celui de sa grand-mère aux trois morts. Puis elle laissa une ligne vide pour la population de la couche non admise, parce qu’un peuple privé de nom ne devait pas recevoir le premier venu d’une plaideuse pressée.\n\nLa Déclaration entra dans la chambre d’Orseille amputée. Senn avait refusé d’utiliser une lentille intacte. On travailla avec les fragments d’[[helianthe|Hélianthe]], la pierre de Verrance, le rameau, le câble coupé, les contrats, la quittance fendue. Une machine faite de preuves blessées. Les [[ateliers-d-orseille|Ateliers]] auraient trouvé cela laid. Dame Sio déclara seulement que la laideur avait parfois de bonnes tolérances.\n\nQuand l’opération commença, il n’y eut pas de lumière glorieuse. Les grandes choses, Ova l’avait appris, arrivaient souvent comme une baisse de pression. Les rues de Verrance perdirent leur troisième saison. Des murs se couvrirent de condensation noire. Dans le Noyau, des actes de naissance s’ouvrirent sans ordre. Sur la Digue, des pièces promises apparurent avec des gravures de mains inconnues, mais pas assez nombreuses pour éviter tous les départs. À Ronce-Claire, les serres scellées rejetèrent les équipes autorisées en produisant des pollens non catalogués. À Orseille, les lentilles Hélianthe restantes se ternirent, chacune conservant au centre un point impossible à polir.\n\nPuis la couche non admise répondit.\n\nPas par une voix unique. Par des milliers de signes trop ordinaires pour être du miracle : demandes d’air, inventaires d’outils, récits de naissances, listes de morts, injures contre les Maisons, prières à des dieux de filtre et de couloir, plans de réparation, refus de quitter certains lieux, exigences de ne pas être appelés survivants d’Ancre parce qu’ils avaient aussi fondé autre chose. La Couronne découvrit que ce qu’elle avait traité comme contrepoids avait appris à se tenir debout dans le poids.\n\nLa restitution limitée rompit sept routes dans l’heure. Trois habitats médicaux déclarèrent urgence noire. Maël avait prévu des stocks ; ils suffirent pour deux, pas pour le troisième. Ova lut les chiffres sans détourner les yeux. Une décision juste pouvait tuer si elle arrivait après trop d’injustice. C’était la phrase qu’aucun hymne ne voudrait garder.\n\nTarek obtint des navettes lentes pour Huit-Bord en échange de son témoignage technique. Il perdit son commandement provisoirement, puis le reprit quand personne d’autre ne sut faire obéir les compresseurs déplacés. Lio retourna vers Ronce-Claire avec moins de rameau qu’il n’en avait emporté et plus de monde dans sa mémoire. Senn fut suspendu des Greffiers, ce qui n’annula pas sa marge publique. Maël cessa d’être chef de Maison avant la fin du jour. Dame Sio livra aux Tables les secrets de fabrication d’Hélianthe avec assez de lacunes pour forcer trois générations d’apprentis à réfléchir avant de copier.\n\nOva rentra chez Iram quand les saisons de son quartier se stabilisèrent à deux, ce qui parut presque silencieux. Il était assis sur une chaise. La troisième avait disparu. Pas effacée : démontée, peut-être, redistribuée ailleurs.\n\n— Nous avons gagné ? demanda-t-il.\n\nOva pensa aux routes rompues, aux morts qui viendraient avec retard, aux familles qui découvriraient des ancêtres non clos, aux Greffiers qui chercheraient déjà une nouvelle grammaire de contrôle, aux Ronceliers qui se battraient pour que leur plante ne devienne pas une industrie, aux Diguards qui déplaceraient leurs cabines sans chanson pendant quelques jours parce que certaines pertes ne méritaient pas encore la musique.\n\n— Nous avons cessé de perdre seuls, dit-elle.\n\nIram hocha la tête, comme si c’étai     "hook": "Elle refuse de devenir partageable au prix de cesser d’être dense.",
    "links": [
      "droit-de-broussaille",
      "veilleurs-de-l-ecart",
      "serres-de-ronce-claire"
    ],
    "article": "Notice diplomatique rédigée pour les négociateurs débutants, avec avertissement : ne pas lire à voix haute en présence d’un délégué ligueur.\n\nLa Ligue des Vivants Locaux rassemble des habitats, mondes agricoles, stations culturelles et communautés juridiques qui refusent les Concordances profondes. Elle n’est pas anti-technologique. Elle accepte les messages, des plans, des médicaments simples et certaines formes de secours. Ce qu’elle refuse, c’est que sa vie sociale soit reformatée pour correspondre durablement aux fenêtres de passage.\n\nSa doctrine tient dans une phrase souvent mal citée : « une communauté doit pouvoir produire des faits dont personne d’autre n’a besoin ». Les Tabulaires entendent là une menace contre la solidarité. Les Ligueurs répondent qu’une solidarité exigeant de tout rendre mesurable finit par appeler assistance ce qui ressemble le plus à une annexion.\n\nDétail absent des traités hostiles : la Ligue entretient des « stocks de honte », réserves de médicaments et pièces obtenues par les routes qu’elle critique. Ces stocks sont rendus publics dans les assemblées locales, afin que la dépendance ne soit pas transformée en innocence. Les adversaires appellent cela hypocrisie ; les Ligueurs, hygiène morale.\n\nLa Ligue se déchire régulièrement entre refus puriste et nécessité médicale. Lors des épidémies, ses demandes de passage deviennent aussi pressantes que celles des Maisons. La controverse la plus vive n’est donc pas de savoir si elle a besoin de la Couronne, mais si le besoin doit donner à la Couronne le droit de la remodeler."
  },
  "maisons-de-pli": {
    "id": "maisons-de-pli",
    "title": "Maisons de Pli",
    "category": "factions",
    "hook": "Elles ne possèdent pas les passages, seulement ce sans quoi les passages meurent.",
    "links": [
      "mael-des-lignes-basses",
      "chambre-de-passage",
      "route-basse"
    ],
    "article": "Extrait des Institutions de la Couronne lente, attribué à un économiste dont les Maisons financèrent puis désavouèrent la chaire.\n\nLes Maisons de Pli sont des lignées de logisticiens, d’assureurs, de négociants et de gestionnaires de risque. Elles ne possèdent presque jamais officiellement les chambres de passage. Elles possèdent les contrats, les stocks, les garanties, les équipes de synchronisation, les matériaux témoins et les assurances sans lesquelles aucune chambre n’oserait s’ouvrir. Cette distinction est juridiquement claire et moralement commode.\n\nChaque Maison cultive une spécialité : grains, médicaments, pièces mécaniques, routes froides, flux judiciaires. Les Lignes-Basses sont connues pour leurs routes médicales à marge serrée. D’autres, plus anciennes, entretiennent des traditions de mécénat qui coïncident curieusement avec les secteurs où leurs péages sont les moins discutés.\n\nDétail rarement admis : les héritiers de Maison suivent des exercices appelés « dîners de rupture », durant lesquels on retire un plat de la table tant que l’enfant n’a pas identifié quelle population paiera la fermeture hypothétique d’une route. L’exercice produit d’excellents négociateurs et parfois de très mauvais dormeurs.\n\nLes Maisons se décrivent comme remèdes à la distance. Leurs adversaires les nomment marchands de dépendance. La controverse ne porte pas sur leur utilité, presque incontestable, mais sur l’instant où une utilité devient architecture de captivité. Les archives anciennes des concessions de détour demeurent le point le plus sensible de cette question."
  },
  "veilleurs-de-l-ecart": {
    "id": "veilleurs-de-l-ecart",
    "title": "Veilleurs de l’Écart",
    "category": "factions",
    "hook": "Ils recueillent ce que les registres appellent erreur et que d’autres nomment monde.",
    "links": [
      "ecart",
      "blancs-reguliers",
      "ligue-des-vivants-locaux"
    ],
    "article": "Entrée compilée à partir de trois sources veilleresses incompatibles. Aucune n’a accepté les corrections des deux autres.\n\nLes Veilleurs de l’Écart sont souvent décrits comme des mystiques, ce qui leur rend service lorsqu’ils veulent être sous-estimés. Ils se considèrent plutôt comme des naturalistes du réel non résolu. Ils recueillent des dialectes trop ambigus, des rites funéraires incompatibles, des versions de procès inutilisables, des lignées végétales non cataloguées et des témoignages que les tribunaux refusent de stabiliser.\n\nLeur organisation est volontairement lâche. Une cellule de Verrance peut travailler avec une confrérie de Méridien sans accepter ses croyances. Les seules obligations communes sont le dépôt non concordé des matériaux et l’interdiction de corriger un témoin pour le rendre plus émouvant. Cette dernière règle est souvent violée, surtout par les jeunes Veilleurs qui confondent résistance et dramaturgie.\n\nDétail peu connu : certains Veilleurs portent des clochettes sourdes cousues dans leurs vêtements. Elles ne sonnent pas ; elles prouvent seulement que le porteur accepte de transporter un objet dont l’usage visible est nul. Les Greffiers y voient du théâtre. Les Veilleurs parlent d’entraînement à l’inutile.\n\nLeur contradiction est grave. En protégeant l’incommensurable, ils protègent aussi des abus qui s’y cachent. Les Maisons l’exploitent volontiers : il suffit de nommer une opacité « différence sacrée » pour ralentir une enquête. La frontière entre sanctuaire et cachette reste l’une des plaies politiques de la Couronne."
  },
  "dame-sio-d-atelier-clair": {
    "id": "dame-sio-d-atelier-clair",
    "title": "Dame Sio d’Atelier-Clair",
    "category": "personnages",
    "hook": "Elle sait qu’une lentille mal accordée peut tuer, et que cette vérité justifie trop de portes fermées.",
    "links": [
      "ateliers-d-orseille",
      "orseille",
      "helianthe"
    ],
    "article": "Notice issue des Vies d’artisans d’Orseille, édition contestée par Atelier-Clair.\n\nDame Sio d’Atelier-Clair est l’une des maîtresses lentillières les plus influentes d’Orseille. Ses partisans la décrivent comme une gardienne de la tolérance juste. Ses détracteurs, comme une prêtresse du monopole. Les deux portraits manquent ce qui la rend redoutable : elle a souvent raison techniquement, et le sait assez pour se tromper moralement.\n\nEn apprentissage, Sio aurait fait tomber une lentille qui, au lieu de se briser, chanta faux. Son maître lui interdit de la rattraper et l’obligea à écouter ce que l’objet avait perdu. Depuis, elle parle des lentilles comme de personnes disciplinées : elles obéissent, se fatiguent, anticipent, cachent parfois la lâcheté de leur accordeur.\n\nDétail vérifié par plusieurs élèves : ses anneaux de mesure chantent plus bas lorsqu’elle évite une réponse. À Orseille, ce n’est pas considéré comme une faiblesse, mais comme une forme polie de déclaration incomplète.\n\nDame Sio a soutenu des innovations jugées trop opaques par les Greffiers et trop lentes par les Maisons. Sa controverse principale tient au secret. Elle affirme que certains savoirs, mal compris, multiplient les Ancre. Les opposants répondent qu’un savoir gardé trop longtemps finit par choisir lui-même ses victimes."
  },
  "iram-sans-suture": {
    "id": "iram-sans-suture",
    "title": "Iram sans Suture",
    "category": "personnages",
    "hook": "Un témoin qui refuse d’arriver entier au prix de devenir faux.",
    "links": [
      "ova-sous-cloture",
      "descendants-du-debordement",
      "population-sous-la-phrase"
    ],
    "article": "Note biographique issue d’un dossier de témoignage partiellement stabilisé.\n\nIram sans Suture vit à Verrance dans une pièce où les murs changent de couleur selon la fatigue de la version présente. Les médecins lui ont attribué plusieurs âges recevables selon les instruments : ses mains appartiennent parfois à un homme plus ancien que sa voix, ses yeux à un enfant qui n’a pas fini de se défendre. Les Greffiers classent cela comme continuité plurielle sous observation. Iram préfère parler de fatigue mal distribuée.\n\nIl laisse souvent une chaise vide dans les pièces où il dort. Les voisins y voient une habitude de bassin. Les lecteurs de contradiction y reconnaissent une hospitalité rare : laisser place à ce qui n’a pas encore trouvé de version sûre. Une tradition orale prétend qu’un homme ivre s’assit un jour sur cette chaise et parla trois minutes avec la voix d’une réparatrice d’Ancre.\n\nDétail non retenu par le dossier principal : Iram nomme ses horloges. La méchante est celle qui lui demande de se simplifier. La patiente est celle qui accepte de ne pas savoir lequel de ses âges répondra.\n\nIram est précieux comme témoin, ce qui constitue son danger. Toute cause politique voudrait l’utiliser assez pour gagner sans le briser. Sa résistance tient en une phrase que les juristes citent mal : il peut témoigner, mais ne peut pas promettre d’arriver entier à la fin de sa phrase."
  },
  "lio-de-seve-retard": {
    "id": "lio-de-seve-retard",
    "title": "Lio de Sève-Retard",
    "category": "personnages",
    "hook": "Le gardien d’une plante qui ne digère pas la dette : elle la retrouve.",
    "links": [
      "serres-de-ronce-claire",
      "ronceliers",
      "droit-de-broussaille"
    ],
    "article": "Portrait roncelier traduit sous réserve : certains verbes de reprise n’ont pas d’équivalent tabulaire.\n\nLio de Sève-Retard est greffeur de Ronce-Claire, issu d’une famille qui confie ses morts aux outils minéralisés plutôt qu’aux urnes. Son surnom ne désigne pas une lenteur d’esprit, mais une aptitude rare : sentir dans la paume le moment où une tige reprend sans encore avoir choisi sa direction. Les étrangers y voient une sensibilité agricole. Les anciens y voient une responsabilité.\n\nSa biographie est marquée par une greffe de deuil ratée, celle d’un frère confié trop tôt à une lignée familiale. Depuis, Lio se méfie de toute extraction prématurée. Il parle par détour non pour séduire, mais parce qu’une phrase nette lui paraît souvent une coupe mal cicatrisée.\n\nDétail absent des registres de culture : Lio garde dans sa poche trois osselets minéraux provenant d’outils familiaux. Les Ronceliers ne les appelleraient pas talismans. Ils diraient que les morts continuent de vérifier la manière dont les vivants touchent les choses.\n\nLes controverses autour de lui concernent une lignée végétale sans nom stable, capable de réagir à des Écarts extérieurs. Les Maisons voudraient y voir une ressource. Les Greffiers, un objet d’audit. Lio insiste : une plante qui survit à l’usage n’a pas nécessairement accepté d’être utilisée. Cette phrase est peut-être une éthique, peut-être un aveu de peur.\n\n# Document de travail — codex 2/3"
  },
  "maude-sans-miroir": {
    "id": "maude-sans-miroir",
    "title": "Maude sans Miroir",
    "category": "personnages",
    "hook": "Elle a appris que les vérités exactes peuvent entrer trop vite et laisser des morts derrière elles.",
    "links": [
      "senn-de-troisieme-marge",
      "greffiers-de-parite",
      "blancs-reguliers"
    ],
    "article": "Portrait non signé, refusé par les archives officielles au motif d’une proximité excessive avec le sujet.\n\nMaude sans Miroir est première vérificatrice dans une section basse des Tables. Son nom, d’abord moquerie d’enfance, est devenu titre de sérieux. Les récits affirment qu’elle fit retirer les miroirs de sa chambre par austérité. Des sources plus intimes suggèrent qu’elle craignait surtout les versions d’elle-même que les reflets ne demandaient pas de certifier.\n\nSa réputation est celle d’une Greffière froide, capable de fermer une anomalie avant que les jeunes lecteurs aient fini de lui donner un nom héroïque. Cette froideur a une histoire : une marge contradictoire qu’elle ouvrit jadis retarda une route de traitements. La procédure lui donna raison. Trois habitats perdirent des patients. Depuis, Maude ne croit plus à l’innocence d’avoir raison correctement.\n\nDétail observé par ses élèves : elle serre les coupes de thé au point d’en blanchir les doigts lorsqu’elle ment pour protéger. Elle ne ment pas avec aisance ; elle ment comme on maintient une porte contre une dépressurisation.\n\nMaude représente la prudence devenue clôture. Ses critiques la disent complice de l’effacement. Ses défenseurs répondent qu’elle sait combien de morts peut produire une vérité libérée sans forme. La controverse est insoluble tant qu’on ne demande pas qui décide du moment où une forme devient tombeau."
  },
  "mael-des-lignes-basses": {
    "id": "mael-des-lignes-basses",
    "title": "Maël des Lignes-Basses",
    "category": "personnages",
    "hook": "L’homme qui compte les vies sauvées jusqu’à découvrir la colonne absente.",
    "links": [
      "maisons-de-pli",
      "route-basse",
      "helianthe"
    ],
    "article": "Portrait économique révisé après ouverture partielle des archives de Maison.\n\nMaël des Lignes-Basses dirige une Maison de Pli spécialisée dans les routes médicales à marge serrée. Contrairement aux caricatures de négociateurs marchands, il ne parle pas d’abord de profits. Il parle de dépendances, de fenêtres de passage, de stocks et d’enfants immunodéprimés. Cette sincérité le rend plus difficile à condamner, non moins dangereux.\n\nSon éducation fut quantitative au sens presque religieux. On lui apprit très tôt que ne pas choisir tue aussi, que le plus petit habitat est souvent le plus facile à sacrifier, et qu’une clause peut contenir une famine. Maël a tiré de cette formation une vertu réelle : il voit les conséquences que d’autres préfèrent abstraire. Il en a tiré aussi son aveuglement : ce qui n’entre pas dans la colonne du coût disparaît plus proprement qu’une victime niée.\n\nDétail conservé par un domestique de Maison : enfant, il détestait les desserts aux fruits confits depuis un exercice où son père lui fit attribuer les traitements d’une route fermée avant de lui rendre son assiette. Les pédagogies de responsabilité produisent parfois des adultes que la honte nourrit mieux que la joie.\n\nMaël incarne la question centrale des Maisons : combien de bien faut-il accomplir pour qu’un système violent cesse de ressembler à une faute ? La réponse dépend souvent de celui qui tient le compte."
  },
  "ova-sous-cloture": {
    "id": "ova-sous-cloture",
    "title": "Ova sous Clôture",
    "category": "personnages",
    "hook": "Une plaideuse qui transforme les corrections subies en formes recevables, puis les rend dangereuses.",
    "links": [
      "verrance",
      "descendants-du-debordement",
      "iram-sans-suture"
    ],
    "article": "Portrait publié dans les Annales de jurisprudence instable, avec réserves du Noyau.\n\nOva sous Clôture est plaideuse de Verrance et lectrice de contradiction. Son état civil contient des variations que les Tables qualifient de gérables, adjectif dont elle se méfie plus que des insultes. Elle a construit sa réputation en donnant aux juges exactement assez de contradiction pour qu’ils ne puissent détourner les yeux, mais pas assez pour clore par hygiène procédurale.\n\nSa méthode est parfois accusée de froideur. Elle utilise le papier avec les témoins, car les ratures y restent visibles, et prépare ses dossiers comme des chambres de passage : il faut que la douleur survive au transfert sans devenir un spectacle. Cette discipline lui a valu autant de victoires que de reproches.\n\nDétail rarement cité : Ova s’arrête toujours devant les chaises vides dans les appartements de témoins. Sa grand-mère, morte à trois dates, lui avait appris qu’une absence peut être un meuble et qu’il est dangereux de s’asseoir trop vite à la place des corrigés.\n\nSon combat apparent porte sur les indemnisations des Descendants du Débordement. Son combat réel est plus instable : forcer une institution à reconnaître qu’une preuve peut mutiler celui qu’elle sauve. Ses ennemis la disent excessive. Ses alliés savent qu’elle dose encore trop."
  },
  "senn-de-troisieme-marge": {
    "id": "senn-de-troisieme-marge",
    "title": "Senn-de-Troisième-Marge",
    "category": "personnages",
    "hook": "Un Greffier qui croit aux marges jusqu’au jour où elles ressemblent à des murs.",
    "links": [
      "greffiers-de-parite",
      "maude-sans-miroir",
      "ouverture-de-marge"
    ],
    "article": "Portrait extrait des Figures mineures de la Table Basse, édition non définitive.\n\nSenn-de-Troisième-Marge appartient à une maison de registre modeste, connue moins pour ses charges que pour l’erreur qu’elle porta pendant trois générations : une ancêtre déclarée morte, vivante, puis corrigée comme doublon après Ancre. Cette dette familiale a donné au jeune Senn le goût des lignes non fermées. Ses maîtres y virent une qualité ; ses proches, une inquiétude habillée de méthode.\n\nComme lecteur de marge, il se distingue par une attention presque excessive aux formes de l’absence. Il ne cherche pas d’abord ce qui manque, mais la manière dont le manque a été rendu acceptable. Un collègue a dit de lui qu’il « entendait les blancs avec les yeux ». La formule, trop littéraire pour les Tables, circula néanmoins dans les couloirs.\n\nDétail conservé hors dossier : Senn porte parfois sur lui la quittance de sa mère lors d’audits importants, alors que les objets biographiques troublent les mesures. Il prétend que cette infraction mineure lui rappelle que les registres concernent des morts. On peut soupçonner qu’il attend surtout que l’objet le contredise.\n\nSes adversaires le jugent dangereux par scrupule. Ses alliés, dangereux par fidélité : il prend assez au sérieux les procédures pour les retourner contre leur propre usage politique. La question non tranchée est de savoir si Senn cherche à sauver les Tables ou à leur offrir enfin une faute complète."
  },
  "tarek-main-seche": {
    "id": "tarek-main-seche",
    "title": "Tarek Main-Sèche",
    "category": "personnages",
    "hook": "Il croit aux poids, aux clés, et aux corps qu’on regarde avant de les classer.",
    "links": [
      "digue-de-huit",
      "diguards",
      "chambre-de-passage"
    ],
    "article": "Portrait tiré des Chroniques de maintenance de Huit-Bord, enrichi par des annotations non publiées.\n\nTarek Main-Sèche est capitaine de traction lente sur la Digue de Huit. Son nom ne renvoie pas à une dureté morale, mais à une ancienne brûlure chimique qui lui a laissé la paume droite moins sensible au froid qu’à la vibration. Les Diguards le respectent pour une qualité rare : il coupe peu, mais coupe au bon endroit.\n\nSa culture le rend méfiant envers les passages personnels. Il n’y voit pas un sacrilège, plutôt une perte de responsabilité matérielle. Ce qui arrive par chambre peut arriver sans que personne ne sache quelle fatigue l’a porté. Tarek préfère les routes lentes, les vieux instruments et les outils qui ont déjà déçu au moins une fois.\n\nDétail souvent raconté à Huit-Bord : il conserve dans sa cabine une pièce trop entaillée de l’outil de sa mère. La pièce est inutilisable. Elle rappelle qu’un rite refusé peut rendre un mort plus seul, non plus libre.\n\nSon rapport aux contrats est simple et dangereux : un contrat qui ne tient pas sous une clé n’est qu’une corde bien habillée. Les Maisons le jugent local, incapable de mesurer les conséquences systémiques. Lui répond rarement. Il pose la main sur les gaines, écoute la pression, puis demande : « où va ce qu’on ne veut pas nommer ? » La Couronne redoute les hommes capables de poser une question aussi concrète."
  },
  "chambre-de-passage": {
    "id": "chambre-de-passage",
    "title": "Chambre de passage",
    "category": "technologie",
    "hook": "La pièce où l’objet traverse moins l’espace qu’une version admissible de lui-même.",
    "links": [
      "concordance",
      "declaration-d-ame",
      "tarek-main-seche"
    ],
    "article": "Extrait des Instructions aux opérateurs de premier seuil, avec commentaires non autorisés d’un mécanicien de Digue.\n\nLa chambre de passage est l’espace contrôlé où l’on place la charge destinée au transfert. Elle assure isolement, stabilité thermique, synchronisation des témoins et soumission de l’objet à la décision de lentille. Lorsque tout fonctionne, il ne se passe presque rien de spectaculaire. Les opérateurs expérimentés disent qu’une bonne chambre ressemble à une phrase prononcée sans accent.\n\nLes chambres transportent efficacement les objets standardisés : minerais raffinés, médicaments stables, pièces mécaniques, graines certifiées, archives chiffrées. Elles se troublent devant les objets chargés d’histoire. Une bague familiale coûte plus cher à passer qu’un conteneur de boulons. Une annotation manuscrite peut produire plus d’Écart qu’une tonne de métal.\n\nDétail pratique : les chambres anciennes possèdent souvent des niches de retrait destinées aux opérateurs qui doivent rester présents sans être inclus dans la parité principale. Les règlements modernes les interdisent, mais plusieurs stations les conservent derrière des panneaux de maintenance. Les Diguards disent qu’il est bon qu’une machine ait un endroit où cacher un humain non prévu.\n\nLe statut des corps en chambre demeure l’un des grands tabous. Un passager humain exige déclaration d’âme, réduction biographique et consentement à des incertitudes que peu de contrats savent honnêtement expliquer. Les chambres promettent l’arrivée. Elles ne promettent jamais que l’arrivée sera identique au départ dans la seule langue qui importe au voyageur."
  },
  "concordance": {
    "id": "concordance",
    "title": "Concordance",
    "category": "technologie",
    "hook": "La technique qui ne plie pas l’espace, mais persuade deux lieux qu’ils appartiennent un instant à la même phrase.",
    "links": [
      "registre-causal",
      "lentille-de-parite",
      "ecart"
    ],
    "article": "Article de l’Encyclopedia Galactica lente, version pédagogique amendée par les Tables.\n\nLa Concordance est le procédé par lequel deux lieux préparés deviennent temporairement assez similaires, dans leurs états d’observation, pour permettre le transfert d’objets, messages ou charges standardisées. Contrairement aux mythes populaires, elle n’est pas un moteur supraluminique. Elle ne réduit pas la distance ; elle rend deux fragments du réel descriptivement voisins pendant un intervalle contrôlé.\n\nTrois composants sont nécessaires : un registre causal, une lentille de parité et une chambre de passage. À cela s’ajoutent les éléments plus humiliants de la pratique : cycles lumineux copiés, alarmes synchronisées, inventaires symboliques, températures de référence, habitudes administratives répétées jusqu’à l’ennui. La grande révolution interstellaire repose largement sur la capacité de deux lieux à faire semblant d’avoir eu une journée comparable.\n\nDétail souvent oublié : les premières Concordances commerciales transportaient des lots de clous standardisés, non des médicaments ni des messages héroïques. Les clous furent choisis parce qu’ils possédaient peu d’histoire et beaucoup d’utilité. Plusieurs écoles y voient encore le symbole parfait de la Couronne : relier d’abord ce qui peut être compté sans pleurer.\n\nLa Concordance réussit mal avec les objets biographiques et presque jamais sans dommage avec les personnes. Elle exige une comptabilité de la différence. Ses défenseurs disent qu’elle a sauvé des mondes. Ses critiques répondent qu’elle les a sauvés en leur apprenant à se ressembler sous menace de rupture."
  },
  "declaration-d-ame": {
    "id": "declaration-d-ame",
    "title": "Déclaration d’âme",
    "category": "technologie",
    "hook": "La procédure par laquelle un humain accepte d’être décrit sans être entièrement réduit.",
    "links": [
      "chambre-de-passage",
