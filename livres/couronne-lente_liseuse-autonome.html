      "couche-non-admise"
    ],
    "article": "Entrée du Code des passages personnels, précédée dans l’édition originale d’un avertissement pastoral aujourd’hui supprimé.\n\nLa déclaration d’âme est le protocole requis pour un passage humain. Elle ne prouve pas l’existence d’une âme au sens religieux. Elle établit juridiquement qu’une continuité personnelle possède des éléments que le registre n’a pas le droit de simplifier sans deuil public. C’est moins une métaphysique qu’une limite imposée à la métrologie.\n\nLe déclarant doit réduire sa biographie à un registre admissible : souvenirs essentiels, dettes familiales, objets biographiques, blessures identitaires, relations dont la coupure modifierait sa personne. Certaines catégories doivent être exclues pour éviter surcharge. C’est ici que naît l’horreur ordinaire : choisir quel souvenir de son père, quel mensonge d’enfance ou quelle honte de corps mérite de voyager.\n\nDétail rarement mentionné dans les brochures : les déclarants sont invités à enregistrer une « phrase de refus », courte formule que la chambre doit conserver même en cas d’instabilité. Les plus anciennes archives contiennent des phrases d’une simplicité terrible : ne me rendez pas utile ; ma sœur n’est pas un détail ; ne pas simplifier sans deuil.\n\nLes passages humains réussis existent, mais restent moralement suspects. Les riches les achètent, les désespérés les acceptent, les institutions les déconseillent avec une hypocrisie variable. La controverse porte moins sur le risque que sur l’autorité de la description : qui a le droit de dire ce qu’une personne peut perdre en restant elle-même ?"
  },
  "helianthe": {
    "id": "helianthe",
    "title": "Hélianthe",
    "category": "technologie",
    "hook": "La lentille qui préparait la marge avant que l’erreur n’existe.",
    "links": [
      "dame-sio-d-atelier-clair",
      "ateliers-d-orseille",
      "mael-des-lignes-basses"
    ],
    "article": "Dossier technique partiellement rendu public. Les passages entre crochets ont été remplacés par des commentaires de l’éditeur.\n\nHélianthe désigne une série de lentilles d’Orseille présentée comme capable de réduire d’environ un tiers la charge des routes denses. Sa promesse ne reposait pas seulement sur une meilleure comparaison des registres, mais sur une précompensation des divergences probables. Les anciennes lentilles corrigeaient après mesure ; Hélianthe préparait la place où l’Écart risquait de naître.\n\nSes défenseurs y voyaient une économie de dette, particulièrement précieuse pour les routes médicales. Ses critiques y reconnurent un déplacement de souveraineté : si la lentille prépare la marge, alors quelqu’un a déjà décidé quel futur désaccord serait acceptable. Cette décision peut sauver des enfants. Elle peut aussi fabriquer le couloir où une population disparaît plus efficacement.\n\nDétail d’atelier révélé tardivement : certains prototypes d’Hélianthe étaient testés avec des irrégularités musicales imitant la fatigue humaine. Les artisans voulaient éviter la perfection suspecte. Mais une fatigue imitée peut devenir plus convaincante qu’une fatigue réelle, surtout pour des auditeurs pressés par des crises.\n\nLa question des matériaux sources demeure trouble. Des retours d’Ancre, des contrats de détour et des couches non admises semblent avoir participé à la table de probabilité. Les Ateliers parlent d’héritage technique. Les juristes demandent à partir de quel moment un héritage devient recel de catastrophe."
  },
  "lentille-de-parite": {
    "id": "lentille-de-parite",
    "title": "Lentille de parité",
    "category": "technologie",
    "hook": "L’instrument qui compare les histoires jusqu’à décider quelles différences peuvent être reportées.",
    "links": [
      "orseille",
      "ateliers-d-orseille",
      "helianthe"
    ],
    "article": "Notice technique simplifiée, que tout maître d’Orseille trouverait insultante mais utilisable.\n\nLa lentille de parité est l’organe comparateur de la Concordance. Elle confronte deux registres causaux, mesure leurs similitudes pertinentes, annule ou marginalise les écarts tolérables et indique si une chambre de passage peut s’ouvrir sans produire une dette catastrophique. Le mot lentille est trompeur : les modèles avancés ne se contentent pas de voir. Ils écoutent, pèsent, anticipent parfois.\n\nLes meilleures lentilles viennent d’Orseille, où le verre est traité comme une forme de jurisprudence. Un défaut microscopique peut transformer une cargaison en preuve contradictoire. Une correction trop élégante peut inspirer confiance au moment précis où il faudrait douter.\n\nDétail historique : les premières lentilles portaient des griffures volontaires sur leurs bords. Ces imperfections, appelées « marques d’humilité », empêchaient les comparaisons de devenir trop parfaites sur des données insuffisantes. Les modèles récents les remplacent par des irrégularités calculées, ce qui scandalise les vieux artisans. Imiter l’humilité n’est pas l’avoir, disent-ils.\n\nLa lentille pose une question morale dissimulée sous l’ingénierie : qui lui apprend ce qu’il faut considérer comme négligeable ? Les Greffiers répondent : le droit. Les Ateliers : l’ouvrage. Les Maisons : l’usage. Les bassins, rarement consultés, répondraient peut-être : ceux qui n’auront pas à porter la négligence."
  },
  "registre-causal": {
    "id": "registre-causal",
    "title": "Registre causal",
    "category": "technologie",
    "hook": "Un lieu n’y note pas seulement ce qu’il a mesuré, mais ce qu’il a accepté de perdre.",
    "links": [
      "concordance",
      "greffiers-de-parite",
      "ouverture-de-marge"
    ],
    "article": "Article du Lexique de métrologie civique, édition destinée aux apprentis Greffiers.\n\nLe registre causal est le dossier vivant qui décrit l’historique d’observation d’un lieu, d’une chambre, d’un objet ou d’une route. Il contient mesures physiques, pertes admises, corrections, alarmes, témoins matériels, décisions de marge et parfois éléments symboliques jugés nécessaires à la parité. Une Concordance sans registre causal est une promesse sans mémoire.\n\nLes profanes imaginent le registre comme une archive. Les Greffiers préfèrent le mot « respiration ». Un bon registre n’est pas fixe ; il porte des hésitations, corrections datées, signatures de fatigue, traces de litige. Les registres trop propres éveillent autant de méfiance que les registres corrompus, car l’absence d’erreur peut être une erreur parfaitement entraînée.\n\nDétail rarement communiqué : certains registres de routes anciennes conservent des « silences qualifiés ». Il ne s’agit pas de lacunes, mais de zones où l’on indique qu’une information fut volontairement non décrite afin d’éviter un effet de parité. Les Greffiers justifient cette pratique par la sécurité. Les critiques y voient l’ancêtre respectable du mensonge utile.\n\nLa propriété d’un registre est disputée. Les Tables affirment qu’un registre appartient à la Couronne dès qu’il affecte les passages. Les cultures locales répliquent qu’un lieu ne cesse pas de posséder son histoire parce que d’autres en ont besoin. La question devient brûlante lorsque le registre d’une population entière a été rédigé sans son nom."
  },
  "route-basse": {
    "id": "route-basse",
    "title": "Route basse",
    "category": "technologie",
    "hook": "Une chaîne de passage vitale dont le prix réel fut longtemps écrit ailleurs.",
    "links": [
      "maisons-de-pli",
      "mael-des-lignes-basses",
      "couche-non-admise"
    ],
    "article": "Entrée logistique ajoutée à l’Index des routes sous pression, statut controversé.\n\nLa route basse n’est pas une route unique, mais un ensemble de passages, relais, garanties et contrats permettant l’acheminement à coût réduit de traitements médicaux, pièces fines et charges instables vers des habitats à faible marge économique. Le terme « basse » viendrait autant des prix maintenus que des couches de compensation mobilisées sous les cartes publiques.\n\nLes Lignes-Basses en firent leur spécialité et leur justification. Là où les Maisons anciennes choisissaient les flux rentables, elles acceptèrent des routes malades, des dépendances fortes, des risques de réputation. Beaucoup d’habitats survécurent grâce à cette politique. C’est pourquoi la critique de la route basse ne peut être une simple dénonciation du profit.\n\nDétail que les opérateurs connaissent mieux que les plaideurs : les caisses de route basse portent souvent des doubles registres de manutention, l’un pour les chambres, l’autre pour les relais lents. Lorsque les deux divergent, on donne priorité au registre qui préserve la fenêtre de passage. Ce choix, répété, devient une doctrine sans avoir jamais été voté.\n\nLa controverse centrale tient aux bassins non admis. Si certaines économies de coût furent obtenues par déplacement de dette vers des lieux privés de statut, alors la route basse n’a pas seulement relié les pauvres : elle a créé une pauvreté plus profonde encore pour rendre cette liaison supportable.\n\n# Document de travail — codex 3/3"
  },
  "ecart": {
    "id": "ecart",
    "title": "Écart",
    "category": "technologie",
    "hook": "La divergence que l’univers accepte de ne pas résoudre tout de suite.",
    "links": [
      "concordance",
      "verrance",
      "veilleurs-de-l-ecart"
    ],
    "article": "Entrée du Manuel commun des seuils, annotée par une main veilleresse : « trop propre ».\n\nL’Écart désigne la quantité de divergence produite ou révélée lorsqu’une Concordance rend compatibles des lieux, objets ou récits qui ne le sont pas entièrement. Il ne s’agit pas d’une substance, bien que le langage courant parle de stocker, déplacer ou absorber l’Écart. C’est une dette de résolution. Le réel accepte, pour un temps, que des différences ne soient pas traitées à l’endroit où elles apparaissent.\n\nLes manifestations ordinaires incluent documents contradictoires, pannes statistiques, souvenirs incompatibles, lignées mal additionnées, objets à provenance multiple. Les manifestations graves exigent des bassins d’Écart, c’est-à-dire des lieux, couches ou institutions qui supportent la divergence afin que les routes restent utilisables.\n\nDétail technique peu enseigné : les seuils d’Écart comportent une marge de courtoisie. Deux instruments peuvent déclarer un passage acceptable non parce qu’ils s’accordent, mais parce que leur désaccord appartient à une plage historiquement tolérée. Les juristes appellent cela prudence ; les habitants de bassins, fatigue héritée.\n\nL’Écart est politiquement explosif car il rend visible la question que toute société préfère éviter : qui porte les contradictions nécessaires à la vie commune ? Les Greffiers veulent le mesurer, les Maisons le tarifent, les Veilleurs le recueillent, les bassins le subissent. Nul ne l’annule. Certains prétendent pourtant avoir découvert des formes vivantes capables de le digérer. La prudence exige de demander ce qu’elles excrètent."
  },
  "debordement-d-ancre": {
    "id": "debordement-d-ancre",
    "title": "Débordement d’Ancre",
    "category": "histoire",
    "hook": "Quarante-sept secondes de réussite officielle, puis trois siècles de conséquences.",
    "links": [
      "delaisse-d-ancre",
      "descendants-du-debordement",
      "ere-des-comptes-tenus"
    ],
    "article": "Entrée historique révisée après plusieurs procès d’indemnisation. Les chiffres demeurent provisoires par nature.\n\nLe Débordement d’Ancre désigne la catastrophe née d’une Concordance massive impliquant habitats, infrastructures planétaires et matières instables. Pendant quarante-sept secondes, selon les registres officiels, le calcul réussit. Ensuite, l’Écart accumulé chercha des lieux où se loger. Une planète cessa d’être entièrement d’accord avec elle-même, et des milliers de personnes reçurent des preuves valables de morts, enfances, filiations ou crimes incompatibles.\n\nLa catastrophe fonda les interdits majeurs : jamais de Concordance planétaire totale, jamais de passage humain collectif, jamais de registre unique sans bassin désigné. Ces règles sont aujourd’hui récitées avec solennité par des institutions dont les ancêtres contournèrent parfois les premières versions au nom de l’urgence.\n\nDétail macabre peu enseigné : les équipes de secours durent créer des « morgues de probabilité », salles où l’on conservait les corps selon la version de décès à laquelle ils appartenaient le moins mal. Certaines familles reçurent trois convocations funéraires et aucune certitude de présence.\n\nLes historiens débattent encore du statut d’Ancre : accident d’hubris, crime marchand, échec technique, ou révélation d’une loi plus ancienne ? Les Descendants du Débordement insistent sur une autre formulation : une catastrophe n’est pas terminée tant que ses victimes doivent encore se rendre plus simples pour obtenir réparation."
  },
  "ferveur-des-copies": {
    "id": "ferveur-des-copies",
    "title": "Ferveur des Copies",
    "category": "histoire",
    "hook": "L’âge où l’abondance eut le goût discret d’une correction permanente.",
    "links": [
      "premiere-parite",
      "tabulaires",
      "debordement-d-ancre"
    ],
    "article": "Chapitre abrégé des Histoires civiques, souvent lu trop vite par les élèves qui aiment les succès.\n\nLa Ferveur des Copies suivit la Première Parité. Les mondes voulurent se relier vite, et la vitesse exigea des ressemblances. On harmonisa poids, rites civiques, formats de testament, signaux lumineux, unités de parenté, calendriers de fête et jusqu’aux seuils administratifs de deuil. Les bénéfices furent immenses : maladies traitées, famines réduites, bibliothèques partagées, pièces compatibles.\n\nMais la copie n’était jamais neutre. Des dialectes furent déclarés trop ambigus pour les canaux compressés. Des fêtes locales furent déplacées pour coïncider avec des fenêtres de passage. Des lignées compliquées furent simplifiées afin de produire des héritages recevables. Les poètes de la Ligue disent que la Couronne apprit alors à sourire avec les dents de tout le monde alignées.\n\nDétail rarement confessé : certaines administrations organisaient des « semaines de similitude » durant lesquelles les écoles, marchés et tribunaux adoptaient temporairement les horaires d’un monde partenaire pour faciliter une route. Ces semaines devinrent des traditions dans plusieurs cités, dont les habitants oublièrent l’origine logistique.\n\nLes défenseurs de l’époque rappellent qu’elle sauva des millions de vies. Ses critiques répondent qu’elle créa la grammaire du sacrifice invisible. Le Débordement d’Ancre ne surgit pas contre cette ferveur, mais au bout d’elle : lorsque tout semblait copiable, certains crurent possible de copier un monde entier."
  },
  "premiere-parite": {
    "id": "premiere-parite",
    "title": "Première Parité",
    "category": "histoire",
    "hook": "Le moment où partir devint aussi accepter d’être décrit.",
    "links": [
      "meridien-faible",
      "concordance",
      "ferveur-des-copies"
    ],
    "article": "Article standard des manuels, suivi d’une note marginale dont l’origine reste discutée.\n\nLa Première Parité est l’ère ouverte par les expériences de Méridien-Faible, lorsqu’il fut démontré que deux chambres séparées pouvaient échanger des états physiques si leurs historiques d’observation devenaient suffisamment similaires. Les récits scolaires insistent sur la progression : impulsions, molécules, blocs de matière, puis réseaux de passage. Le vocabulaire changea plus vite encore : partir ne signifia plus seulement traverser, mais être rendu admissible à un autre lieu.\n\nLa découverte fut accueillie comme une délivrance par de nombreuses colonies issues des Traversées muettes. Les famines locales, les ruptures de pièces et l’isolement médical semblaient enfin négociables. Les premiers traités de parité furent signés dans une ferveur presque religieuse par des populations qui se croyaient revenues dans une histoire commune.\n\nDétail peu repris : les premiers techniciens de Méridien déposaient une coupe d’eau gelée dans chaque chambre avant essai, non pour la mesure, mais pour vérifier si le froid « reconnaissait » le froid. Cette pratique, jugée primitive, fut abandonnée avant d’être redécouverte comme témoin thermique secondaire.\n\nLa note marginale affirme cependant que Méridien-Faible n’offrit pas une nature vierge aux chercheurs. Les cristaux portaient déjà des préparations régulières, trop anciennes pour l’explication officielle. Si cela est vrai, la Première Parité fut moins une invention qu’une réponse tardive à une question posée par un autre ordre du réel."
  },
  "traversees-muettes": {
    "id": "traversees-muettes",
    "title": "Traversées muettes",
    "category": "histoire",
    "hook": "Avant de rendre les mondes similaires, il fallut accepter de les perdre pendant des générations.",
    "links": [
      "digue-de-huit",
      "diguards",
      "premiere-parite"
    ],
    "article": "Extrait des Chronologies profondes, volume I, utilisé dans les écoles de la Digue avec de nombreuses corrections orales.\n\nLes Traversées muettes désignent l’ère antérieure à la Concordance, lorsque des vaisseaux subluminiques furent lancés vers les étoiles proches sans espoir de réponse rapide. Muettes, non parce qu’elles ne parlaient pas, mais parce que leurs paroles arrivaient trop tard pour modifier ceux qui les avaient envoyées. Elles fondèrent des colonies isolées, chacune contrainte d’inventer ses calendriers, ses rites de survie et ses mensonges nécessaires.\n\nLes cultures actuelles les honorent différemment. Les Tabulaires y voient un âge de divergence héroïque qu’il fallut ensuite rendre compatible. Les Diguards y voient la source de leur dignité : un corps et une cargaison doivent pouvoir arriver par fatigue réelle. Les Ronceliers se souviennent surtout des semences qui mutèrent hors de tout catalogue.\n\nDétail rarement enseigné dans le Noyau : les premiers équipages gravaient parfois des messages sur des pièces de maintenance destinées à l’usure, non sur des plaques commémoratives. « Si tu lis ceci, j’ai été remplacé correctement » est l’une des inscriptions les plus citées de la Digue.\n\nLa Première Parité a transformé les Traversées en préhistoire utile. Beaucoup de lignées lentes contestent cette réduction. Elles rappellent que la Couronne n’existerait pas si des générations n’avaient pas accepté de ne jamais devenir voisines de ceux qu’elles sauvaient."
  },
  "ere-des-comptes-tenus": {
    "id": "ere-des-comptes-tenus",
    "title": "Ère des Comptes tenus",
    "category": "histoire",
    "hook": "Le temps présent administre la divergence au lieu de rêver l’unité parfaite.",
    "links": [
      "debordement-d-ancre",
      "maisons-de-pli",
      "ecart"
    ],
    "article": "Notice contemporaine, donc suspecte, rédigée dans un style que les historiens futurs jugeront probablement défensif.\n\nL’Ère des Comptes tenus est le nom donné à la période ouverte après les interdits d’Ancre et toujours en cours. Elle ne rêve plus d’unification totale. Elle mesure, certifie, facture, marginalise et déplace. Chaque route possède un coût d’Écart, chaque cité un seuil de tolérance, chaque famille importante un passif historique plus ou moins lisible.\n\nSa stabilité apparente vient de la reconnaissance partielle de la dette. Les institutions savent que toute connexion simplifie. Elles prétendent donc tenir les comptes de cette simplification : qui reçoit, qui paie, qui supporte, qui peut réclamer. C’est un progrès sur la Ferveur des Copies, mais un progrès qui a appris à parler d’une voix basse.\n\nDétail révélateur : les écoles de commerce des Maisons enseignent désormais l’histoire des bassins dès la première année, mais sous l’intitulé « externalités de continuité ». Plusieurs étudiants en sortent persuadés d’avoir étudié l’éthique, alors qu’ils ont surtout appris à lui donner des colonnes.\n\nL’ère actuelle est travaillée par la saturation des bassins, la contestation des cultures locales, l’opacité des nouvelles lentilles et les procès des Descendants. Les Comptes tenus pourraient devenir les Comptes rendus. La différence entre les deux expressions déterminera si la Couronne se réforme, ou si elle découvre seulement plus précisément l’endroit où elle rompt."
  },
  "diguards": {
    "id": "diguards",
    "title": "Diguards",
    "category": "cultures",
    "hook": "Ils mesurent la vérité à ce qu’une main peut tenir sans embellir.",
    "links": [
      "digue-de-huit",
      "tarek-main-seche",
      "traversees-muettes"
    ],
    "article": "Entrée culturelle enrichie de proverbes de maintenance, dont certains ont été nettoyés pour publication.\n\nLes Diguards descendent des équipages de vaisseaux lents et des relais de la Digue de Huit. Leur monde valorise réparation visible, loyauté sans grand discours et promesse proportionnée aux mains disponibles. Ils n’aiment pas l’héroïsme abstrait. Un grand serment qui ne précise pas qui tiendra la clé passe pour une forme de fuite.\n\nLe deuil diguard consiste à démonter l’outil préféré du mort et à redistribuer ses pièces, chacune portant une entaille de mémoire. Cette pratique choque les cultures de relique. Les Diguards répondent qu’un mort respecté doit continuer à rendre service sans être possédé par un seul vivant.\n\nDétail linguistique : les jurons de Digue sont souvent des diagnostics déguisés. Une bordée d’injures bien structurée peut signaler l’emplacement d’une panne, la priorité d’une fuite et l’identité du responsable sans interrompre le travail. Les enfants apprennent très tôt la différence entre jurer pour vider l’air et jurer utile.\n\nLes Diguards se méfient des passages humains, non par superstition, mais parce qu’ils soupçonnent toute arrivée sans trajet visible de transférer la fatigue sur quelqu’un d’autre. Leur limite est inverse : ils peuvent réparer longtemps sans nommer la politique de la panne. Leur culture sait porter. Elle apprend plus difficilement à accuser."
  },
  "droit-de-broussaille": {
    "id": "droit-de-broussaille",
    "title": "Droit de broussaille",
    "category": "cultures",
    "hook": "Le droit de ne pas répondre clairement quand la clarté serait une capture.",
    "links": [
      "ronceliers",
      "ligue-des-vivants-locaux",
      "serres-de-ronce-claire"
    ],
    "article": "Article juridique traduit du roncelier, avec pertes reconnues.\n\nLe droit de broussaille autorise, dans certaines circonstances, une personne ou une communauté roncelière à refuser une réponse nette lorsqu’une transformation en cours risquerait d’être blessée par la classification. Il ne dispense pas de responsabilité. Il suspend l’extraction. Les Tabulaires y voient une zone dangereuse de non-recevabilité ; les Ronceliers, un espace où le vivant peut choisir sa cicatrice.\n\nLes conditions traditionnelles sont strictes : la chose protégée doit être en reprise, le demandeur doit pouvoir nuire par la catégorie qu’il impose, et le refus doit rester consultable par des pairs. Un droit de broussaille sans témoins devient un simple secret, donc une tentation de pouvoir.\n\nDétail procédural peu connu : les assemblées de serre conservent des « phrases de broussaille » sous forme de graines sèches. Chaque graine correspond à un refus ancien. Lorsqu’une situation se répète, on plante la graine pour voir si le sol actuel accepte la même défense. Les Greffiers détestent cette jurisprudence botanique.\n\nLe droit est invoqué par la Ligue des Vivants Locaux et redouté par les Maisons. Sa controverse tient à sa beauté même. Une réponse oblique peut protéger une plante, un deuil ou une culture. Elle peut aussi protéger un trafiquant, un patriarche ou un lâche. Toute broussaille exige donc un jardinier que personne ne possède."
  },
  "ouverture-de-marge": {
    "id": "ouverture-de-marge",
    "title": "Ouverture de marge",
    "category": "cultures",
    "hook": "Le rite tabulaire où l’on devient adulte en acceptant une erreur non close.",
    "links": [
      "tabulaires",
      "registre-causal",
      "senn-de-troisieme-marge"
    ],
    "article": "Notice rituelle extraite du Livre des usages tabulaires, avec commentaires d’un anthropologue de Verrance.\n\nL’ouverture de marge marque la majorité dans de nombreuses familles tabulaires. Le jeune adulte inscrit dans son premier registre personnel une erreur familiale, une dette ou une contradiction qu’il accepte de porter sans la corriger. Le rite ne célèbre pas l’innocence, mais l’entrée dans une chaîne de responsabilité antérieure à soi.\n\nLa cérémonie est brève. Une table nue, un témoin, parfois une tasse de thé clair. Le candidat lit la ligne, indique ce qu’il en comprend, puis ce qu’il n’a pas le droit de prétendre comprendre. Les familles riches ajoutent des formules anciennes. Les maisons modestes gardent souvent le silence, jugé plus difficile à falsifier.\n\nDétail absent des versions officielles : certains adolescents refusent la marge proposée et demandent une erreur plus grave. Les écoles tabulaires interprètent cela comme romantisme. Les psychologues de Verrance y voient parfois une tentative de choisir sa blessure avant qu’une institution ne la choisisse.\n\nL’ouverture de marge produit une vertu réelle : elle enseigne que l’héritage n’est jamais pur. Mais elle peut devenir une domestication de l’injustice. Porter sans corriger est noble lorsque la correction serait un effacement. C’est violent lorsque le porteur est tenu dans l’ignorance de ce qu’il porte. Toute marge ouverte pose donc une question fermée trop tôt : qui a choisi cette erreur pour cet enfant ?"
  },
  "ronceliers": {
    "id": "ronceliers",
    "title": "Ronceliers",
    "category": "cultures",
    "hook": "Ils honorent moins ce qui demeure que ce qui change sans rompre.",
    "links": [
      "serres-de-ronce-claire",
      "droit-de-broussaille",
      "lio-de-seve-retard"
    ],
    "article": "Notice ethnobotanique préparée avec l’aide d’un traducteur qui refusa de stabiliser trois verbes importants.\n\nLes Ronceliers habitent les Serres de Ronce-Claire et pensent le vivant comme une suite de reprises plutôt que comme une identité stable. Leurs rites suivent floraisons, mutations, odeurs de sol et caprices de l’étoile variable. Ils considèrent qu’un organisme n’est jamais identique à lui-même d’une saison à l’autre ; ils se méfient donc des registres qui exigent des noms trop tôt.\n\nLe deuil roncelier ne conserve pas des cendres. Il greffe un fragment minéral lié au défunt dans une lignée capable de continuer la transformation. Un ancêtre n’est pas honoré parce qu’il demeure, mais parce qu’il accepte de se déformer dans les vivants.\n\nDétail culinaire : les repas d’accord avec des étrangers comportent un plat volontairement servi à deux maturités différentes. L’invité doit dire non laquelle est « correcte », mais laquelle il peut recevoir sans forcer la plante. Les Maisons trouvent cela théâtral. Les Ronceliers y évaluent la dangerosité d’un partenaire.\n\nLeur droit de broussaille est incompris : il ne s’agit pas de mentir, mais de protéger une transformation contre une extraction prématurée. Pourtant cette culture du détour peut cacher des abus, des privilèges locaux et des lâchetés. Les Ronceliers le savent mieux que leurs critiques. Ils préfèrent une broussaille responsable à une clarté qui arrache les racines."
  },
  "tabulaires": {
    "id": "tabulaires",
    "title": "Tabulaires",
    "category": "cultures",
    "hook": "Un peuple qui demande moins qui vous êtes que de quoi vous répondez.",
    "links": [
      "noyau-des-tables",
      "ouverture-de-marge",
      "senn-de-troisieme-marge"
    ],
    "article": "Article du Répertoire des cultures de passage, rédigé par une ethnographe tabulaire qui se soupçonne elle-même de complaisance.\n\nLes Tabulaires dominent le Noyau des Tables et les administrations de parité. Leur culture valorise la lisibilité, la dette reconnue, la sobriété publique et la distinction des statuts du fait. Un enfant tabulaire apprend tôt qu’un récit vécu n’est pas un récit certifié, et qu’un mensonge tenu par courtoisie doit porter une étiquette intérieure.\n\nLeur rite de majorité, l’ouverture de marge, consiste à inscrire une erreur familiale ou personnelle que l’on accepte de porter sans la corriger. Le geste peut sembler froid. Il est souvent profondément émotionnel, mais les Tabulaires considèrent l’émotion publique comme une surcharge de procédure.\n\nDétail domestique : dans certaines maisons, les miroirs sont couverts pendant les périodes de dette non close. On dit qu’un visage trop souvent consulté apprend à préférer une version de lui-même avant que le registre soit prêt. La coutume recule dans les quartiers modernes, mais demeure chez les familles de vérificateurs.\n\nLes Tabulaires sont accusés d’avoir confondu partage du vrai et domination par la forme. Ils répondent qu’une vérité non partageable abandonne les faibles aux puissants locaux. Cette défense est sincère. Elle n’empêche pas leur langue d’avoir parfois la brutalité des instruments bien entretenus : elle ne frappe pas fort, elle coupe net."
  },
  "ancre-residuel": {
    "id": "ancre-residuel",
    "title": "Ancre résiduel",
    "category": "mysteres",
    "hook": "Un nom de carte pour ce qui reste quand une planète n’a plus le droit d’être un lieu.",
    "links": [
      "delaisse-d-ancre",
      "route-basse",
      "couche-non-admise"
    ],
    "article": "Entrée supprimée de trois index logistiques. Cette version provient d’une copie de route non concordée.\n\nAncre résiduel apparaît dans certains contrats anciens, cartes de détour et tables de compensation comme destination, couche ou mention de risque. La formule est volontairement ambiguë. Elle peut désigner les restes exploitables du Délaissé d’Ancre, des matériaux revenus de ses marges, ou une zone de stockage causale associée à la catastrophe. Dans la pratique, elle semble surtout avoir permis de nommer sans admettre.\n\nLes Maisons de Pli utilisèrent parfois ce type de mention dans l’après-Ancre pour maintenir des routes médicales et commerciales lorsque les bassins reconnus menaçaient de déborder. Les Greffiers tolérèrent des formulations provisoires. Les provisoires, comme chacun sait, sont les monuments les plus durables de la lâcheté administrative.\n\nDétail technique : les coordonnées d’Ancre résiduel ne se comportent pas comme des coordonnées ordinaires. Elles varient selon la chaîne contractuelle consultée, mais conservent un même angle de retour dans les schémas de compensation. Les navigateurs de Digue disent que c’est une destination qui n’aime pas les cartes, mais reconnaît les dettes.\n\nLa controverse est explosive. Si Ancre résiduel n’est qu’un marquage de risque, les archives sont sales mais compréhensibles. S’il correspond à un lieu de continuité sociale non admise, alors une partie de la Couronne a reçu secours, médicaments et stabilité d’une population classée comme mécanisme."
  },
  "blancs-reguliers": {
    "id": "blancs-reguliers",
    "title": "Blancs réguliers",
    "category": "mysteres",
    "hook": "Ces absences ont des bords trop polis pour être des pertes.",
    "links": [
      "maude-sans-miroir",
      "meridien-faible",
      "operation-inverse"
    ],
    "article": "Fragment du Traité des absences formatées. L’auteur a retiré son nom après enquête des Tables.\n\nOn appelle blancs réguliers des lacunes de registre dont les bords, loin d’être corrompus ou brisés, présentent une forme stable et reconnaissable. Ils apparaissent dans certains protocoles anciens, matériaux d’Ancre, déclarations d’âme incomplètes et couches pré-Parité de Méridien-Faible. Leur régularité est leur scandale : une perte accidentelle ne devrait pas posséder une telle courtoisie.\n\nL’explication officielle parle de transferts de format, d’anciennes clôtures pédagogiques réutilisées, ou de corrections successives ayant produit une signature commune. L’hypothèse marginale affirme que ces blancs ne sont pas des suppressions après coup, mais les empreintes d’une opération : un lieu, une personne ou une relation aurait été rendue étrangère à ses propres conséquences.\n\nDétail de laboratoire : lorsqu’on projette certains blancs sur des matériaux témoins de Méridien, les cristaux ne réagissent pas comme devant une absence. Ils produisent une faible résonance latérale, semblable à celle d’un chemin refusé plutôt qu’à celle d’un trou. Ce résultat n’a jamais été stabilisé publiquement.\n\nLes blancs réguliers sont dangereux parce qu’ils déplacent la question. Il ne s’agit plus de savoir qui a effacé quoi, mais quelle technique a permis que l’effacement ressemble à une propriété naturelle du dossier. La plupart des érudits prudents s’arrêtent ici."
  },
  "couche-non-admise": {
    "id": "couche-non-admise",
    "title": "Couche non admise",
    "category": "mysteres",
    "hook": "Ce n’est pas un lieu dans le droit, ce qui n’a jamais empêché des gens d’y vivre.",
    "links": [
      "ancre-residuel",
      "population-sous-la-phrase",
      "declaration-d-ame"
    ],
    "article": "Notice de sécurité classée, reconstituée à partir de citations judiciaires et de graffitis de Verrance.\n\nUne couche non admise est, selon la définition administrative la moins compromettante, une zone de compensation causale non reconnue comme lieu, utilisée ou détectée dans le cadre d’un débordement d’Écart. Le droit la traite comme état, non comme territoire. Cette distinction permet beaucoup de choses : stocker une divergence, y renvoyer une charge, éviter d’ouvrir des droits, et ne pas demander qui respire de l’autre côté.\n\nLes contrats de l’après-Ancre mentionnent parfois des couches non admises sous des noms techniques : détour, compensation silencieuse, contrepoids, couche auxiliaire. Chaque expression a l’élégance d’un drap propre sur un lit occupé.\n\nDétail rapporté par plusieurs sources indépendantes : certaines couches émettent des formules de politesse altérées, notamment des remerciements pour pièces, filtres ou chaleur. Les défenseurs du modèle affirment qu’il s’agit de simulations de charge. Les mécaniciens de Digue répliquent que les modèles ne remercient pas pour des clés de rechange.\n\nLe scandale de la couche non admise tient à sa négation productive. Le système ne dit pas qu’il n’y a rien ; il dit qu’il n’y a rien de recevable comme sujet. Si des continuités sociales s’y sont formées, chaque route qui a profité de leur contrepoids devient un acte politique rétroactif. Les Tables détestent les rétroactions morales."
  },
  "operation-inverse": {
    "id": "operation-inverse",
    "title": "Opération inverse",
    "category": "mysteres",
    "hook": "Non pas relier par similitude, mais rendre sa différence à ce qui fut forcé de ressembler.",
    "links": [
      "blancs-reguliers",
      "delaisse-d-ancre",
      "concordance"
    ],
    "article": "Entrée contradictoire. Trois écoles attribuent cette notion à trois découvertes différentes ; aucune n’a produit de preuve publiable sans danger.\n\nL’opération inverse est le nom provisoire donné à une technique ou propriété qui agirait comme envers de la Concordance. Là où la Concordance rend deux lieux assez similaires pour permettre un passage, l’opération inverse rendrait étrangère une similitude imposée. Elle ne restaure pas un passé pur. Elle défait une compatibilité fabriquée, en rendant visibles les dettes, pertes et relations que cette compatibilité avait déplacées.\n\nLes premiers indices sont les blancs réguliers, certains retours d’Ancre et les comportements de matériaux témoins qui réagissent non à une présence, mais à une relation confisquée. Les théologiens y voient parfois un jugement du réel. Les Greffiers préfèrent parler d’anti-parité, terme commode car il donne l’impression que le phénomène attendait leur vocabulaire.\n\nDétail spéculatif : des cristaux de Méridien-Faible soumis à des récits volontairement divergents ont produit des motifs semblables à des racines inversées. L’expérience fut interrompue lorsque deux techniciens commencèrent à se souvenir d’un même trajet accompli par aucun d’eux.\n\nL’opération inverse serait libératrice et catastrophique. Elle pourrait rendre leur nom à des couches non admises, mais aussi rompre des routes, déstabiliser des familles, défaire des identités construites par lissage. Rendre ce qu’on a pris ne signifie pas revenir avant le vol. Cette nuance suffit à effrayer tous les camps honnêtes."
  },
  "population-sous-la-phrase": {
    "id": "population-sous-la-phrase",
    "title": "Population sous la phrase",
    "category": "mysteres",
    "hook": "Ceux que la Couronne traita comme contrepoids apprirent peut-être à se tenir debout dans le poids.",
    "links": [
      "couche-non-admise",
      "iram-sans-suture",
      "ova-sous-cloture"
    ],
    "article": "Entrée attribuée à une école de Verrance. Le Noyau la classe comme hypothèse militante ; les marges la classent comme blessure méthodique.\n\nLa « population sous la phrase » désigne l’hypothèse selon laquelle certaines couches non admises ne stockent pas seulement de l’Écart, mais abritent des continuités sociales complètes : familles, métiers, rites, besoins, mémoires et refus. Le terme vient d’une formule veilleresse : la Couronne écrit une phrase commune, et certains vivent dessous pour qu’elle reste lisible.\n\nLes preuves disponibles sont fragmentaires : signatures de ravitaillement, demandes d’outils, voix traversant des témoins de Verrance, déclarations d’âme incomplètes, remerciements techniques dans des annexes censées décrire des modèles. Les sceptiques invoquent des simulations de charge et des effets de bassin. Les habitants de Verrance répondent que les simulations n’inventent pas des injures aussi précises contre les Maisons.\n\nDétail recueilli par trois lecteurs de contradiction : plusieurs messages supposés de cette population refusent le mot survivants. Ils disent avoir fondé autre chose, non simplement prolongé Ancre. Cette nuance est décisive. Reconnaître seulement des victimes permettrait une réparation. Reconnaître un peuple imposerait une diplomatie.\n\nLa controverse demeure volontairement mal posée par les institutions : elles demandent si cette population existe. La question plus dangereuse est depuis quand la Couronne agit comme si elle n’existait pas tout en recevant les bénéfices de son existence.\n\n---\n# Index des id par catégorie\n\n## lieux\n- noyau-des-tables\n- verrance\n- serres-de-ronce-claire\n- digue-de-huit\n- meridien-faible\n- orseille\n- delaisse-d-ancre\n\n## factions\n- greffiers-de-parite\n- maisons-de-pli\n- veilleurs-de-l-ecart\n- ligue-des-vivants-locaux\n- descendants-du-debordement\n- ateliers-d-orseille\n\n## personnages\n- senn-de-troisieme-marge\n- lio-de-seve-retard\n- tarek-main-seche\n- ova-sous-cloture\n- mael-des-lignes-basses\n- dame-sio-d-atelier-clair\n- maude-sans-miroir\n- iram-sans-suture\n\n## technologie\n- concordance\n- ecart\n- registre-causal\n- lentille-de-parite\n- chambre-de-passage\n- declaration-d-ame\n- helianthe\n- route-basse\n\n## histoire\n- traversees-muettes\n- premiere-parite\n- ferveur-des-copies\n- debordement-d-ancre\n- ere-des-comptes-tenus\n\n## cultures\n- tabulaires\n- ronceliers\n- diguards\n- droit-de-broussaille\n- ouverture-de-marge\n\n## mysteres\n- blancs-reguliers\n- ancre-residuel\n- couche-non-admise\n- operation-inverse\n- population-sous-la-phrase"
  }
};
</script>
<script>
(() => {
  'use strict';

  const app = document.getElementById('app');
  const progressBar = document.getElementById('progressBar');
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const menuOverlay = document.getElementById('menuOverlay');
  const menuCloseBtn = document.getElementById('menuCloseBtn');
  const menuChapters = document.getElementById('menuChapters');
  const codexQuickBtn = document.getElementById('codexQuickBtn');
  const sheet = document.getElementById('sheet');
  const sheetOverlay = document.getElementById('sheetOverlay');
  const sheetCloseBtn = document.getElementById('sheetCloseBtn');
  const sheetBody = document.getElementById('sheetBody');
  const sheetHandle = document.getElementById('sheetHandle');
  const breadcrumb = document.getElementById('breadcrumb');
  const entryBackBtn = document.getElementById('entryBackBtn');

  const categoryLabels = {
    lieux: 'Lieux',
    factions: 'Factions',
    personnages: 'Personnages',
    technologie: 'Technologie',
    histoire: 'Histoire',
    cultures: 'Cultures',
    mysteres: 'Mystères'
  };
  const categoryOrder = ['lieux','factions','personnages','technologie','histoire','cultures','mysteres'];
  const state = { route: 'home', currentChapter: 1, scroll: {}, entryStack: [], sheetOpen: false };
  let restorePending = null;

  const esc = (value) => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const normalize = (s) => String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

  function inlineMarkup(text) {
    const safe = esc(text);
    return safe
      .replace(/\[\[([^|\]]+)\|([^\]]+)\]\]/g, (_, id, label) => {
        if (!CODEX[id]) return label;
        return `<button class="codex-link" data-codex-id="${esc(id)}">${label}</button>`;
      })
      .replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  }

  function blocksToHtml(markdown, cls='prose') {
    const blocks = String(markdown || '').trim().split(/\n\s*\n/g).filter(Boolean);
    const body = blocks.map(block => {
      const lines = block.split('\n');
      const text = lines.join('<br>');
      return `<p>${inlineMarkup(text)}</p>`;
    }).join('');
    return `<div class="${cls}">${body}</div>`;
  }

  function saveScroll() {
    if (state.route === 'read') state.scroll[state.currentChapter] = window.scrollY;
  }
  function routeTo(route, opts={}) {
    saveScroll();
    state.route = route;
    if (opts.chapter) state.currentChapter = opts.chapter;
    render();
  }

  function render() {
    app.innerHTML = '';
    app.className = '';
    closeMenu();
    updateMenuChapters();
    document.querySelectorAll('.menu-link').forEach(btn => btn.classList.toggle('current', btn.dataset.route === state.route));

    if (state.route === 'home') renderHome();
    if (state.route === 'read') renderReader();
    if (state.route === 'codex') renderCodex();
    if (state.route === 'about') renderAbout();

    requestAnimationFrame(() => {
      const view = app.querySelector('.view');
      if (view) view.classList.add('active');
      if (restorePending != null) {
        window.scrollTo(0, restorePending);
        restorePending = null;
      } else {
        window.scrollTo(0, 0);
      }
      updateProgress();
    });
  }

  function renderHome() {
    app.innerHTML = `
      <section class="view home">
        <div class="home-inner">
          <div class="kicker">Récit de la Couronne lente</div>
          <h1>Ne simplifie pas sans deuil</h1>
          <p class="subtitle">Une liseuse immersive pour traverser le récit et son codex, sans quitter la phrase du monde.</p>
          <blockquote class="home-quote">
            « La distance n’est pas ce qui sépare deux lieux. C’est ce qu’il faut rendre identique pour qu’ils acceptent de se répondre. »
            <cite>Fragment attribué aux Tables basses</cite>
          </blockquote>
          <div class="action-row">
            <button class="primary-btn" data-start>Commencer la lecture</button>
            <button class="ghost-btn" data-route="codex">Codex</button>
          </div>
          <div class="home-panels">
            <div class="glass-card">
              <h2 class="card-title">Sommaire</h2>
              <div class="chapter-list">${CHAPTERS.map(ch => chapterButton(ch)).join('')}</div>
            </div>
            <div class="glass-card">
              <h2 class="card-title">Codex</h2>
              <div class="codex-list">
                ${categoryOrder.map(cat => `<button class="codex-row" data-codex-category="${cat}"><span class="item-title">${categoryLabels[cat]}</span><span class="item-meta">${entriesByCategory(cat).length} entrées</span></button>`).join('')}
              </div>
            </div>
          </div>
          <p class="home-note">Ce monde a été créé pour un unique lecteur, pour son anniversaire.</p>
        </div>
      </section>`;
  }

  function chapterButton(ch) {
    const current = ch.number === state.currentChapter ? ' current' : '';
    return `<button class="chapter-link${current}" data-chapter="${ch.number}"><span class="item-title">${String(ch.number).padStart(2,'0')} — ${esc(ch.title)}</span><span class="item-meta">${esc(ch.pov)} · ${esc(ch.place)}</span></button>`;
  }

  function renderReader() {
    const ch = CHAPTERS.find(c => c.number === state.currentChapter) || CHAPTERS[0];
    const prev = CHAPTERS.find(c => c.number === ch.number - 1);
    const next = CHAPTERS.find(c => c.number === ch.number + 1);
    restorePending = state.scroll[ch.number] ?? 0;
    app.innerHTML = `
      <section class="view reader-wrap">
        <header class="chapter-head">
          <div class="chapter-num">Chapitre ${String(ch.number).padStart(2,'0')}</div>
          <h2 class="chapter-title">${esc(ch.title)}</h2>
          <div class="chapter-sub">${esc(ch.pov)} · ${esc(ch.place)}</div>
          <div class="ornament"></div>
        </header>
        ${blocksToHtml(ch.content)}
        <nav class="reader-nav" aria-label="Navigation des chapitres">
          <button class="nav-btn" data-prev ${prev ? '' : 'disabled'}>Précédent</button>
          <button class="nav-btn" data-next ${next ? '' : 'disabled'}>Suivant</button>
        </nav>
      </section>`;
  }

  function entriesByCategory(cat) {
    return Object.values(CODEX).filter(e => e.category === cat).sort((a,b) => a.title.localeCompare(b.title, 'fr'));
  }

  function renderCodex(filter='') {
    app.innerHTML = `
      <section class="view codex-page">
        <div class="section-head">
          <h2>Codex</h2>
          <p>Entrées groupées par catégorie. La recherche filtre les titres ; chaque notice conserve son accroche, son article et ses relations internes.</p>
        </div>
        <div class="search-box"><input id="codexSearch" autocomplete="off" spellcheck="false" placeholder="Rechercher une entrée par titre…" value="${esc(filter)}"></div>
        <div id="codexResults"></div>
      </section>`;
    renderCodexResults(filter);
  }

  function renderCodexResults(filter='') {
    const target = document.getElementById('codexResults');
    if (!target) return;
    const q = normalize(filter);
    let html = '';
    let total = 0;
    for (const cat of categoryOrder) {
      const entries = entriesByCategory(cat).filter(e => !q || normalize(e.title).includes(q));
      total += entries.length;
      if (!entries.length) continue;
      html += `<section class="category-block"><h3 class="category-title"><span>${categoryLabels[cat]}</span><span class="count">${entries.length}</span></h3><div class="codex-grid">`;
      html += entries.map(e => `<button class="codex-card cat-${esc(cat)}" data-entry-id="${esc(e.id)}"><h3>${esc(e.title)}</h3><p>${esc(e.hook)}</p></button>`).join('');
      html += `</div></section>`;
    }
    target.innerHTML = html || `<div class="empty-state">Aucune entrée ne correspond à cette recherche.</div>`;
  }

  function renderAbout() {
    app.innerHTML = `
      <section class="view about-page">
        <div class="section-head"><h2>À propos</h2><p>Un fichier autonome, sans dépendance externe et sans stockage persistant.</p></div>
        <div class="glass-card about-card">
          <p><strong>Mode lecture.</strong> Le récit est présenté un chapitre à la fois, avec progression de lecture et mémorisation de position pendant la session.</p>
          <p><strong>Codex.</strong> Les termes soulignés ouvrent une entrée en panneau bas. Les liens internes gardent un fil d’Ariane, puis rendent au texte sa position exacte.</p>
          <p><strong>Contenu intégré.</strong> Les chapitres v2 et les entrées du codex sont inclus en structures JavaScript locales à ce fichier.</p>
        </div>
      </section>`;
  }

  function openEntry(id, reset=true) {
    if (!CODEX[id]) return;
    if (reset) state.entryStack = [id];
    else state.entryStack.push(id);
    state.sheetOpen = true;
    renderEntry();
    sheetOverlay.classList.add('open');
    sheet.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function renderEntry() {
    const id = state.entryStack[state.entryStack.length - 1];
    const entry = CODEX[id];
    if (!entry) return;
    breadcrumb.textContent = state.entryStack.map(eid => CODEX[eid]?.title || eid).join('  ›  ');
    entryBackBtn.classList.toggle('hidden', state.entryStack.length < 2);
    const links = (entry.links || []).filter(lid => CODEX[lid]);
    sheetBody.innerHTML = `
      <article class="entry cat-${esc(entry.category)}">
        <div class="entry-cat">${esc(categoryLabels[entry.category] || entry.category)}</div>
        <h2>${esc(entry.title)}</h2>
        <p class="entry-hook">${esc(entry.hook)}</p>
        ${blocksToHtml(entry.article, 'entry-article')}
        ${links.length ? `<div class="entry-links">${links.map(lid => `<button class="entry-link-btn" data-entry-id="${esc(lid)}">${esc(CODEX[lid].title)}</button>`).join('')}</div>` : ''}
      </article>`;
    sheetBody.scrollTo(0, 0);
  }

  function closeSheet() {
    state.sheetOpen = false;
    sheetOverlay.classList.remove('open');
    sheet.classList.remove('open');
    document.body.style.overflow = '';
  }

  function openMenu() { menuOverlay.classList.add('open'); sideMenu.classList.add('open'); }
  function closeMenu() { menuOverlay.classList.remove('open'); sideMenu.classList.remove('open'); }

  function updateMenuChapters() {
    menuChapters.innerHTML = CHAPTERS.map(ch => `<button class="menu-link ${ch.number === state.currentChapter && state.route === 'read' ? 'current' : ''}" data-menu-chapter="${ch.number}">${String(ch.number).padStart(2,'0')} — ${esc(ch.title)}</button>`).join('');
  }

  function updateProgress() {
    if (state.route !== 'read') { progressBar.style.width = '0%'; return; }
    const doc = document.documentElement;
    const max = Math.max(1, doc.scrollHeight - window.innerHeight);
    progressBar.style.width = `${Math.min(100, Math.max(0, (window.scrollY / max) * 100))}%`;
  }

  app.addEventListener('click', (ev) => {
    const start = ev.target.closest('[data-start]');
    if (start) return routeTo('read', { chapter: state.currentChapter || 1 });
    const route = ev.target.closest('[data-route]');
    if (route) return routeTo(route.dataset.route);
    const ch = ev.target.closest('[data-chapter]');
    if (ch) return routeTo('read', { chapter: Number(ch.dataset.chapter) });
    const prev = ev.target.closest('[data-prev]');
    if (prev && !prev.disabled) return routeTo('read', { chapter: state.currentChapter - 1 });
    const next = ev.target.closest('[data-next]');
    if (next && !next.disabled) return routeTo('read', { chapter: state.currentChapter + 1 });
    const codex = ev.target.closest('[data-codex-id]');
    if (codex) return openEntry(codex.dataset.codexId, true);
    const entry = ev.target.closest('[data-entry-id]');
    if (entry) return openEntry(entry.dataset.entryId, true);
    const cat = ev.target.closest('[data-codex-category]');
    if (cat) { routeTo('codex'); requestAnimationFrame(() => { const el = document.querySelector(`.category-block .cat-${cat.dataset.codexCategory}`); if (el) el.scrollIntoView({block:'center'}); }); }
  });

  app.addEventListener('input', (ev) => {
    if (ev.target && ev.target.id === 'codexSearch') renderCodexResults(ev.target.value);
  });

  sheetBody.addEventListener('click', (ev) => {
    const codex = ev.target.closest('[data-codex-id]');
    if (codex) return openEntry(codex.dataset.codexId, false);
    const entry = ev.target.closest('[data-entry-id]');
    if (entry) return openEntry(entry.dataset.entryId, false);
  });

  document.querySelectorAll('.menu-link[data-route]').forEach(btn => btn.addEventListener('click', () => routeTo(btn.dataset.route)));
  menuChapters.addEventListener('click', (ev) => {
    const btn = ev.target.closest('[data-menu-chapter]');
    if (!btn) return;
    routeTo('read', { chapter: Number(btn.dataset.menuChapter) });
  });
  menuBtn.addEventListener('click', openMenu);
  menuCloseBtn.addEventListener('click', closeMenu);
  menuOverlay.addEventListener('click', closeMenu);
  codexQuickBtn.addEventListener('click', () => routeTo('codex'));
  sheetCloseBtn.addEventListener('click', closeSheet);
  sheetOverlay.addEventListener('click', closeSheet);
  entryBackBtn.addEventListener('click', () => {
    if (state.entryStack.length > 1) { state.entryStack.pop(); renderEntry(); }
  });

  let dragStart = null;
  let dragCurrent = 0;
  const pointerStart = (ev) => { dragStart = ev.clientY ?? (ev.touches && ev.touches[0].clientY); dragCurrent = 0; };
  const pointerMove = (ev) => {
    if (dragStart == null) return;
    const y = ev.clientY ?? (ev.touches && ev.touches[0].clientY);
    dragCurrent = Math.max(0, y - dragStart);
    if (dragCurrent > 0) sheet.style.transform = window.matchMedia('(min-width: 720px)').matches ? `translate(-50%, ${dragCurrent}px)` : `translateY(${dragCurrent}px)`;
  };
  const pointerEnd = () => {
    if (dragStart == null) return;
    const shouldClose = dragCurrent > 92;
    dragStart = null; dragCurrent = 0; sheet.style.transform = '';
    if (shouldClose) closeSheet();
  };
  sheetHandle.addEventListener('pointerdown', pointerStart);
  window.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerEnd);
  sheetHandle.addEventListener('touchstart', pointerStart, {passive:true});
  window.addEventListener('touchmove', pointerMove, {passive:true});
  window.addEventListener('touchend', pointerEnd);

  window.addEventListener('scroll', () => { saveScroll(); updateProgress(); }, { passive: true });
  window.addEventListener('resize', updateProgress);
  window.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape') { if (state.sheetOpen) closeSheet(); else closeMenu(); }
    if (state.route === 'read' && !state.sheetOpen) {
      if (ev.key === 'ArrowRight' && state.currentChapter < CHAPTERS.length) routeTo('read', { chapter: state.currentChapter + 1 });
      if (ev.key === 'ArrowLeft' && state.currentChapter > 1) routeTo('read', { chapter: state.currentChapter - 1 });
    }
  });

  render();
})();
</script>
</body>
</html>
